<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Characters</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">

  <!-- Shared theme -->
  <link rel="stylesheet" href="theme.css?v=13">

  <style>
    /* Layout-only styles; colors come from theme.css */
    .page-title{
      margin:0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:clamp(1.8rem,3vw,2.4rem);
      line-height:1.1;
    }

    .header-container{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:1rem;
      gap:.75rem;
      flex-wrap:wrap;
    }

    .characters-container{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:1rem;
      margin-top:1rem;
    }

    .character-link{
      text-decoration:none;
      color:inherit;
      display:block;
    }

    .character-link:focus-visible .card{
      outline:2px solid var(--primary);
      outline-offset:2px;
    }

    .character-name{
      margin:0 0 .5rem 0;
      color:var(--text);
      font-weight:700;
      font-size:1.1rem;
    }

    .character-text{
      margin:.25rem 0;
      color:var(--muted);
      font-size:.95rem;
    }

    .empty-state{
      padding:22px;
      text-align:center;
    }

    .empty-state h2{
      margin-top:0;
      color:var(--text);
    }

    .empty-state p{
      color:var(--muted);
      margin:0 0 1rem 0;
    }

    /* Modal */
    .modal{
      display:none;
      position:fixed;
      z-index:1000;
      inset:0;
      background-color:rgba(0,0,0,0.5);
      padding:16px;
    }

    .modal-content{
      background:var(--surface-strong);
      border:1px solid var(--border);
      border-radius:14px;
      width:min(520px,100%);
      margin:5vh auto 0 auto;
      padding:1.25rem;
      box-shadow:var(--shadow);
    }

    .modal-header{
      font-size:1.4rem;
      color:var(--text);
      font-weight:700;
      margin-bottom:1rem;
      font-family:"UnifrakturCook", serif;
    }

    .form-group{ margin-bottom:1rem; }

    .form-group label{
      display:block;
      margin-bottom:.45rem;
      color:var(--text);
      font-weight:700;
    }

    .form-group input,
    .form-group textarea{
      width:100%;
      padding:.75rem;
      border:1px solid var(--border);
      border-radius:10px;
      font-family:"Old Standard TT", Georgia, "Times New Roman", serif;
      font-size:.95rem;
      box-sizing:border-box;
      background:rgba(10,26,110,0.85);
      color:var(--text);
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder{
      color:rgba(255,230,109,.75);
    }

    .form-group textarea{
      resize:vertical;
      min-height:90px;
    }

    .modal-buttons{
      display:flex;
      gap:.75rem;
      justify-content:flex-end;
      margin-top:1.25rem;
      flex-wrap:wrap;
    }

    @media (max-width:720px){
      .characters-container{ grid-template-columns:1fr; }
      .modal-content{ margin-top:3vh; }
    }
  </style>
</head>
<body>
  <main class="container" role="main">
    <div style="margin-bottom:12px;">
      <a class="link-back" href="WorldBuildingIdeas.html">← Return to Novel Index</a>
    </div>

    <section class="section-row header-container">
      <h1 class="page-title">Characters</h1>
      <button class="btn btn-primary" title="Create a new character" onclick="openCharacterModal()">+ New</button>
    </section>

    <section class="glass empty-state" id="no-characters-section">
      <h2>No Characters Yet</h2>
      <p>Get started by creating your first character.</p>
      <button class="btn btn-primary" onclick="openCharacterModal()">Create Character</button>
    </section>

    <section class="characters-container" id="characters-list" style="display:none;"></section>
  </main>

  <div id="characterModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <div class="modal-header">Create a New Character</div>

      <div class="form-group">
        <label for="character-name">Character Name</label>
        <input type="text" id="character-name" placeholder="Enter character name">
      </div>

      <div class="form-group">
        <label for="character-role">Role (e.g., Hero, Villain, Mentor)</label>
        <input type="text" id="character-role" placeholder="Enter character role">
      </div>

      <div class="form-group">
        <label for="character-description">Description</label>
        <textarea id="character-description" placeholder="Describe your character..."></textarea>
      </div>

      <div class="modal-buttons">
        <button class="btn btn-muted" onclick="closeCharacterModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveCharacter()">Create Character</button>
      </div>
    </div>
  </div>

  <script>
    let characters = [];

    function slugify(text) {
      return text.toString().toLowerCase().trim()
        .replace(/[^a-z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
    }

    function openCharacterPage(characterId) {
      const selectedCharacter = characters.find(c => String(c.id) === String(characterId));
      if (!selectedCharacter) return;

      localStorage.setItem('selectedCharacter', JSON.stringify(selectedCharacter));
      window.location.href = `character.html?id=${selectedCharacter.id}&name=${encodeURIComponent(slugify(selectedCharacter.name))}`;
    }

    function loadCharacters() {
      const storedCharacters = localStorage.getItem('characters');
      characters = storedCharacters ? JSON.parse(storedCharacters) : [];
      displayCharacters();
    }

    function displayCharacters() {
      const noCharactersSection = document.getElementById('no-characters-section');
      const charactersList = document.getElementById('characters-list');

      if (characters.length === 0) {
        noCharactersSection.style.display = 'block';
        charactersList.style.display = 'none';
        charactersList.innerHTML = '';
        return;
      }

      noCharactersSection.style.display = 'none';
      charactersList.style.display = 'grid';
      charactersList.innerHTML = '';

      characters.forEach((character) => {
        const link = document.createElement('a');
        link.className = 'character-link';
        link.href = `character.html?id=${character.id}&name=${encodeURIComponent(slugify(character.name))}`;
        link.setAttribute('aria-label', `Open ${character.name}`);
        link.addEventListener('click', (event) => {
          event.preventDefault();
          openCharacterPage(character.id);
        });

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h3 class="character-name">${character.name}</h3>
          <p class="character-text"><strong>Role:</strong> ${character.role || 'Unknown'}</p>
          <p class="character-text">${character.description || 'No description provided'}</p>
        `;

        link.appendChild(card);
        charactersList.appendChild(link);
      });
    }

    function openCharacterModal() {
      document.getElementById('characterModal').style.display = 'block';
      document.getElementById('characterModal').setAttribute('aria-hidden', 'false');
      document.getElementById('character-name').value = '';
      document.getElementById('character-role').value = '';
      document.getElementById('character-description').value = '';
    }

    function closeCharacterModal() {
      document.getElementById('characterModal').style.display = 'none';
      document.getElementById('characterModal').setAttribute('aria-hidden', 'true');
    }

    function saveCharacter() {
      const name = document.getElementById('character-name').value.trim();
      const role = document.getElementById('character-role').value.trim();
      const description = document.getElementById('character-description').value.trim();

      if (!name) {
        alert('Please enter a character name');
        return;
      }

      const newCharacter = {
        id: Date.now(),
        name,
        role: role || 'Unknown',
        description: description || 'No description provided'
      };

      characters.push(newCharacter);
      localStorage.setItem('characters', JSON.stringify(characters));

      closeCharacterModal();
      displayCharacters();
    }

    window.onclick = function(event) {
      const modal = document.getElementById('characterModal');
      if (event.target === modal) {
        closeCharacterModal();
      }
    };

    window.addEventListener('load', loadCharacters);
  </script>
</body>
</html>
