<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Settings</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=17">

  <style>
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
    .page-title{margin:0;color:var(--text);font-family:"UnifrakturCook",serif;font-size:clamp(1.9rem,3.2vw,2.6rem);line-height:1.1}
    .world-name{color:var(--muted);font-size:.95rem;margin:.2rem 0 0;font-weight:700}
    .header-row{display:flex;justify-content:space-between;align-items:center;gap:.75rem;flex-wrap:wrap;margin-bottom:1rem}
    .settings-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem;margin-top:1rem}
    .setting-link{text-decoration:none;color:inherit;display:block}
    .setting-name{margin:0 0 .5rem 0;color:var(--text);font-weight:700;font-size:1.1rem}
    .setting-text{margin:.25rem 0;color:var(--muted);font-size:.95rem}
    .empty-state{padding:22px;text-align:center}
    .empty-state h2{margin-top:0;color:var(--text)}
    .empty-state p{color:var(--muted)}
    .card-actions{display:flex;justify-content:flex-end;margin-top:.65rem}

    .modal{display:none;position:fixed;z-index:1000;inset:0;background-color:rgba(0,0,0,.5);padding:16px}
    .modal-content{
      background:var(--surface-strong);border:1px solid var(--border);border-radius:14px;width:min(520px,100%);
      margin:5vh auto 0 auto;padding:1.25rem;box-shadow:var(--shadow)
    }
    .modal-header{font-size:1.4rem;color:var(--text);font-weight:700;margin-bottom:1rem;font-family:"UnifrakturCook",serif}
    .form-group{margin-bottom:1rem}
    .form-group label{display:block;margin-bottom:.45rem;color:var(--text);font-weight:700}
    .form-group input,.form-group textarea{
      width:100%;padding:.75rem;border:1px solid var(--border);border-radius:10px;
      font-family:"Old Standard TT", Georgia, "Times New Roman", serif;font-size:.95rem;
      background:rgba(10,26,110,0.85);color:var(--text);box-sizing:border-box
    }
    .form-group textarea{resize:vertical;min-height:90px}
    .modal-buttons{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.25rem;flex-wrap:wrap}
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <div>
        <h1 class="page-title">Settings</h1>
        <p class="world-name" id="worldNameDisplay">World: —</p>
      </div>
      <a class="link-back" href="WorldBuildingIdeas.html">← Back to World Ideas</a>
    </div>

    <section class="header-row">
      <h2 style="margin:0; color:var(--text); font-family:'UnifrakturCook',serif;">Your Settings</h2>
      <button class="btn btn-primary" onclick="openSettingModal()">+ New Setting</button>
    </section>

    <section class="glass empty-state" id="no-settings-section">
      <h2>No Settings Yet</h2>
      <p>Create a setting, name it, and build it out with free write + guided questions.</p>
      <button class="btn btn-primary" onclick="openSettingModal()">Create Setting</button>
    </section>

    <section class="settings-container" id="settings-list" style="display:none;"></section>
  </main>

  <div id="settingModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <div class="modal-header">Create a New Setting</div>

      <div class="form-group">
        <label for="setting-name">Setting Name</label>
        <input type="text" id="setting-name" placeholder="e.g., Emberfall City">
      </div>

      <div class="form-group">
        <label for="setting-type">Type (optional)</label>
        <input type="text" id="setting-type" placeholder="e.g., City, Region, Fortress, Forest">
      </div>

      <div class="form-group">
        <label for="setting-description">Short Description (optional)</label>
        <textarea id="setting-description" placeholder="One-paragraph overview..."></textarea>
      </div>

      <div class="modal-buttons">
        <button class="btn btn-muted" onclick="closeSettingModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveSetting()">Create Setting</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js?v=20"></script>
  <script>
    let settings = [];
    let currentWorld = null;

    function getQueryParam(name){
      return new URLSearchParams(window.location.search).get(name);
    }

    function slugify(text) {
      return text.toString().toLowerCase().trim()
        .replace(/[^a-z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
    }

    async function resolveWorld() {
      currentWorld = getCurrentWorld();

      if (!currentWorld || !currentWorld.id) {
        const fromUrl = getQueryParam("world")?.trim();
        document.getElementById("worldNameDisplay").textContent = `World: ${fromUrl || "—"}`;
        alert('Please select a world first.');
        window.location.href = 'YourWorlds.html';
        return false;
      }

      document.getElementById("worldNameDisplay").textContent = `World: ${currentWorld.name || "—"}`;
      localStorage.setItem("lastWorldName", currentWorld.name || '');
      return true;
    }

    async function loadSettings() {
      const user = await getCurrentUser();
      if (!user) {
        alert('Please log in first.');
        settings = [];
        displaySettings();
        return;
      }

      const { data, error } = await sb
        .from('settings')
        .select('id, name, type, description, created_at')
        .eq('user_id', user.id)
        .eq('world_id', currentWorld.id)
        .order('created_at', { ascending: false });

      if (error) {
        alert('Error loading settings: ' + error.message);
        settings = [];
      } else {
        settings = data || [];
      }

      displaySettings();
    }

    function openSettingPage(settingId) {
      const selected = settings.find(s => String(s.id) === String(settingId));
      if (!selected) return;
      localStorage.setItem('selectedSetting', JSON.stringify(selected)); // UI convenience only
      const w = encodeURIComponent(currentWorld?.name || "");
      window.location.href = `setting.html?id=${selected.id}&name=${encodeURIComponent(slugify(selected.name))}&world=${w}`;
    }

    async function deleteSetting(settingId) {
      if (!confirm("Delete this setting?")) return;

      const user = await getCurrentUser();
      if (!user) return;

      const { error } = await sb
        .from('settings')
        .delete()
        .eq('id', settingId)
        .eq('user_id', user.id)
        .eq('world_id', currentWorld.id);

      if (error) {
        alert('Error deleting setting: ' + error.message);
        return;
      }

      settings = settings.filter(s => String(s.id) !== String(settingId));
      displaySettings();
    }

    function displaySettings() {
      const noSection = document.getElementById('no-settings-section');
      const list = document.getElementById('settings-list');

      if (settings.length === 0) {
        noSection.style.display = 'block';
        list.style.display = 'none';
        list.innerHTML = '';
        return;
      }

      noSection.style.display = 'none';
      list.style.display = 'grid';
      list.innerHTML = '';

      settings.forEach((setting) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <a class="setting-link" href="#" data-open="${setting.id}">
            <h3 class="setting-name">${setting.name}</h3>
            <p class="setting-text"><strong>Type:</strong> ${setting.type || '—'}</p>
            <p class="setting-text">${setting.description || 'No description provided'}</p>
          </a>
          <div class="card-actions">
            <button class="btn btn-muted" data-delete="${setting.id}">Delete</button>
          </div>
        `;
        list.appendChild(card);
      });
    }

    document.getElementById("settings-list").addEventListener("click", (e) => {
      const openEl = e.target.closest("[data-open]");
      if (openEl) {
        e.preventDefault();
        openSettingPage(openEl.dataset.open);
        return;
      }

      const deleteEl = e.target.closest("[data-delete]");
      if (deleteEl) {
        e.preventDefault();
        deleteSetting(deleteEl.dataset.delete);
      }
    });

    function openSettingModal() {
      document.getElementById('settingModal').style.display = 'block';
      document.getElementById('settingModal').setAttribute('aria-hidden', 'false');
      document.getElementById('setting-name').value = '';
      document.getElementById('setting-type').value = '';
      document.getElementById('setting-description').value = '';
    }

    function closeSettingModal() {
      document.getElementById('settingModal').style.display = 'none';
      document.getElementById('settingModal').setAttribute('aria-hidden', 'true');
    }

    async function saveSetting() {
      const name = document.getElementById('setting-name').value.trim();
      const type = document.getElementById('setting-type').value.trim();
      const description = document.getElementById('setting-description').value.trim();

      if (!name) {
        alert('Please enter a setting name.');
        return;
      }

      const user = await getCurrentUser();
      if (!user) {
        alert('Please log in first.');
        return;
      }

      const { data, error } = await sb
        .from('settings')
        .insert([{
          user_id: user.id,
          world_id: currentWorld.id,
          name,
          type,
          description
        }])
        .select('id, name, type, description, created_at')
        .single();

      if (error) {
        alert('Error creating setting: ' + error.message);
        return;
      }

      settings.unshift(data);
      closeSettingModal();
      displaySettings();
    }

    window.onclick = function(event) {
      const modal = document.getElementById('settingModal');
      if (event.target === modal) closeSettingModal();
    };

    window.addEventListener('load', async () => {
      const ok = await resolveWorld();
      if (!ok) return;
      await loadSettings();
    });
  </script>
</body>
</html>
