<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Settings</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=16">

  <style>
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .page-title{
      margin:0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:clamp(1.9rem,3.2vw,2.6rem);
      line-height:1.1;
    }

    .world-name{
      color:var(--muted);
      font-size:.95rem;
      margin:.2rem 0 0;
      font-weight:700;
    }

    .section-card{
      border:1px solid var(--border);
      border-radius:14px;
      padding:14px;
      background:linear-gradient(180deg, rgba(12,34,130,.72), rgba(8,24,100,.65));
      box-shadow:var(--shadow);
      margin-top:14px;
    }

    .section-title{
      margin:0 0 .35rem 0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:1.5rem;
      line-height:1.1;
    }

    .section-sub{
      margin:0;
      color:var(--muted);
      font-size:.95rem;
    }

    .freewrite-wrap{
      margin-top:10px;
    }

    .label{
      display:block;
      margin-bottom:6px;
      color:var(--muted);
      font-weight:700;
      font-size:.84rem;
      text-transform:uppercase;
      letter-spacing:.35px;
    }

    textarea, input{
      width:100%;
      border:1px solid var(--border);
      border-radius:10px;
      padding:.75rem;
      font:inherit;
      background:rgba(6,18,80,.88);
      color:var(--text);
      box-sizing:border-box;
    }

    textarea{
      min-height:220px;
      resize:vertical;
      line-height:1.45;
    }

    textarea::placeholder,
    input::placeholder{
      color:rgba(255,230,109,.75);
    }

    .questions-grid{
      margin-top:12px;
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px;
    }

    .question-box{
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px;
      background:rgba(10,26,110,.35);
    }

    .question-title{
      margin:0 0 .5rem 0;
      color:var(--text);
      font-size:.98rem;
      font-weight:700;
      line-height:1.3;
    }

    .question-box textarea{
      min-height:125px;
    }

    .actions{
      display:flex;
      gap:.65rem;
      flex-wrap:wrap;
      margin-top:14px;
    }

    @media(max-width:900px){
      .questions-grid{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <div>
        <h1 class="page-title">Settings</h1>
        <p class="world-name" id="worldNameDisplay">World: —</p>
      </div>
      <a class="link-back" href="WorldBuildingIdeas.html">← Back to World Ideas</a>
    </div>

    <section class="glass" style="padding:14px;">
      <p style="margin:0; color:var(--muted);">
        Build the major settings in your world. Each section has a free write + guided questions.
      </p>

      <div id="settingsSections"></div>

      <div class="actions">
        <button class="btn btn-primary" id="saveBtn">Save</button>
        <button class="btn btn-muted" id="clearBtn">Clear All</button>
      </div>
    </section>
  </main>

  <script>
    // You can rename/add/remove sections here
    const SECTION_DEFS = [
      { key: "capital", title: "Capital City" },
      { key: "majorCity", title: "Major City / Trade Hub" },
      { key: "frontier", title: "Frontier / Wilderness Region" }
    ];

    // Placeholder 10 questions (replace with your real ones anytime)
    const TEN_QUESTIONS = [
      "1) What is this place called, and why?",
      "2) What does it look and feel like on first impression?",
      "3) What is the climate and geography?",
      "4) Who holds power here?",
      "5) What is everyday life like for common people?",
      "6) What is this place known for (good or bad)?",
      "7) What conflict is active in this setting right now?",
      "8) What hidden danger or secret exists here?",
      "9) How does this location connect to the main plot?",
      "10) What would change this place forever?"
    ];

    function getCurrentWorldSafe() {
      try { return JSON.parse(localStorage.getItem('currentWorld') || 'null'); }
      catch { return null; }
    }

    const world = getCurrentWorldSafe();
    const worldName = (world && typeof world.name === "string" && world.name.trim()) ? world.name.trim() : null;
    document.getElementById("worldNameDisplay").textContent = `World: ${worldName || "—"}`;

    const KEY = worldName ? `settingsPage:${worldName}` : `settingsPage:__no_world_selected__`;

    function loadData() {
      try { return JSON.parse(localStorage.getItem(KEY) || "{}"); }
      catch { return {}; }
    }

    function saveData(data) {
      localStorage.setItem(KEY, JSON.stringify(data));
    }

    function buildSectionHTML(section, saved = {}) {
      const freeKey = `${section.key}_freewrite`;

      let qHtml = "";
      TEN_QUESTIONS.forEach((q, i) => {
        const qKey = `${section.key}_q_${i + 1}`;
        qHtml += `
          <article class="question-box">
            <h3 class="question-title">${q}</h3>
            <textarea id="${qKey}" placeholder="Write your answer...">${saved[qKey] || ""}</textarea>
          </article>
        `;
      });

      return `
        <section class="section-card">
          <h2 class="section-title">${section.title}</h2>
          <p class="section-sub">Free write first, then answer the 10 prompts.</p>

          <div class="freewrite-wrap">
            <label class="label" for="${freeKey}">Free Write</label>
            <textarea id="${freeKey}" placeholder="Freely describe this setting...">${saved[freeKey] || ""}</textarea>
          </div>

          <div class="questions-grid">
            ${qHtml}
          </div>
        </section>
      `;
    }

    function renderAll(saved = {}) {
      const mount = document.getElementById("settingsSections");
      mount.innerHTML = SECTION_DEFS.map(s => buildSectionHTML(s, saved)).join("");
    }

    function collectAllData() {
      const out = {};
      SECTION_DEFS.forEach(section => {
        const freeKey = `${section.key}_freewrite`;
        out[freeKey] = document.getElementById(freeKey)?.value || "";

        TEN_QUESTIONS.forEach((_, i) => {
          const qKey = `${section.key}_q_${i + 1}`;
          out[qKey] = document.getElementById(qKey)?.value || "";
        });
      });
      return out;
    }

    // initial render with saved data
    renderAll(loadData());

    document.addEventListener("input", (e) => {
      if (e.target.matches("textarea, input")) {
        saveData(collectAllData());
      }
    });

    document.getElementById("saveBtn").addEventListener("click", () => {
      saveData(collectAllData());
      alert("Saved!");
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      if (!confirm("Clear all settings notes for this world?")) return;
      localStorage.removeItem(KEY);
      renderAll({});
    });
  </script>
</body>
</html>
