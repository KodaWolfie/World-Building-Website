<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Beginning & Ending</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=17">

  <style>
    :root{
      --col-gap: 12px;
      --col-min-h: calc(100vh - 210px);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .page-title{
      margin:0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:clamp(1.8rem,3.1vw,2.5rem);
      line-height:1.1;
    }

    .world-name{
      color:var(--muted);
      font-size:.95rem;
      margin:.2rem 0 0;
      font-weight:700;
    }

    .columns{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:var(--col-gap);
      align-items:stretch;
    }

    .col{
      border:1px solid var(--border);
      border-radius:14px;
      background:linear-gradient(180deg, rgba(12,34,130,.72), rgba(8,24,100,.65));
      box-shadow:var(--shadow);
      padding:12px;
      display:flex;
      flex-direction:column;
      min-height:var(--col-min-h);
    }

    .col h2{
      margin:0 0 .45rem 0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:1.6rem;
      line-height:1.1;
    }

    .col p{
      margin:0 0 .65rem 0;
      color:var(--muted);
      font-size:.94rem;
    }

    .col textarea{
      flex:1;
      width:100%;
      min-height:320px;
      resize:vertical;
      border:1px solid var(--border);
      border-radius:10px;
      padding:.8rem;
      font:inherit;
      line-height:1.5;
      background:rgba(6,18,80,.88);
      color:var(--text);
      box-sizing:border-box;
    }

    .col textarea::placeholder{
      color:rgba(255,230,109,.75);
    }

    .actions{
      display:flex;
      gap:.65rem;
      flex-wrap:wrap;
      margin-top:12px;
    }

    @media(max-width:900px){
      :root{ --col-min-h: 420px; }
      .columns{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <div>
        <h1 class="page-title">Beginning & Ending</h1>
        <p class="world-name" id="worldNameDisplay">World: —</p>
      </div>
      <a class="link-back" href="WorldBuildingIdeas.html">← Back to World Ideas</a>
    </div>

    <section class="glass" style="padding:12px;">
      <div class="columns">
        <section class="col">
          <h2>The Beginning</h2>
          <p>How does the story open? What is the starting state?</p>
          <textarea id="beginningText" placeholder="Write the beginning here..."></textarea>
        </section>

        <section class="col">
          <h2>The Ending</h2>
          <p>How does the story end? What changes by the final moment?</p>
          <textarea id="endingText" placeholder="Write the ending here..."></textarea>
        </section>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="saveBtn">Save</button>
        <button class="btn btn-muted" id="clearBtn">Clear Both</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js?v=20"></script>
  <script>
    let currentWorld = null;

    function collectData() {
      return {
        beginning: document.getElementById("beginningText").value || "",
        ending: document.getElementById("endingText").value || ""
      };
    }

    function applyData(data) {
      document.getElementById("beginningText").value = data?.beginning || "";
      document.getElementById("endingText").value = data?.ending || "";
    }

    async function loadFromSupabase() {
      currentWorld = getCurrentWorld();
      document.getElementById("worldNameDisplay").textContent = `World: ${currentWorld?.name || "—"}`;

      if (!currentWorld || !currentWorld.id) {
        alert('Please select a world first.');
        window.location.href = 'YourWorlds.html';
        return false;
      }

      const user = await getCurrentUser();
      if (!user) {
        alert('Please log in first.');
        return false;
      }

      const { data, error } = await sb
        .from('beginning_endings')
        .select('beginning, ending')
        .eq('user_id', user.id)
        .eq('world_id', currentWorld.id)
        .maybeSingle();

      if (error) {
        alert('Error loading beginning/ending: ' + error.message);
        applyData({});
        return false;
      }

      applyData(data || {});
      return true;
    }

    async function saveToSupabase(showAlert = false) {
      if (!currentWorld || !currentWorld.id) return;

      const user = await getCurrentUser();
      if (!user) return;

      const data = collectData();

      const { error } = await sb
        .from('beginning_endings')
        .upsert([{
          user_id: user.id,
          world_id: currentWorld.id,
          beginning: data.beginning,
          ending: data.ending
        }], { onConflict: 'world_id' });

      if (error) {
        alert('Error saving beginning/ending: ' + error.message);
        return;
      }

      if (showAlert) alert("Saved!");
    }

    document.getElementById("saveBtn").addEventListener("click", async () => {
      await saveToSupabase(true);
    });

    document.getElementById("clearBtn").addEventListener("click", async () => {
      if (!confirm("Clear beginning and ending for this world?")) return;
      applyData({});
      await saveToSupabase(false);
    });

    document.addEventListener("input", async (e) => {
      if (e.target.matches("#beginningText, #endingText")) {
        await saveToSupabase(false);
      }
    });

    window.addEventListener('load', loadFromSupabase);
  </script>
</body>
</html>
