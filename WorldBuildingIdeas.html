<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>World Building Ideas</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">

  <!-- Shared theme -->
  <link rel="stylesheet" href="theme.css?v=13">

  <!-- Supabase Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* Layout only (no competing theme colors/backgrounds) */
    .page-title{
      margin:0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:clamp(1.6rem,3vw,2.2rem);
      line-height:1.1;
    }

    .world-details{
      display:flex;
      gap:2rem;
      flex-wrap:wrap;
      margin-top:1rem;
    }

    .detail{
      display:flex;
      flex-direction:column;
    }

    .detail-label{
      color:var(--muted);
      font-size:.85rem;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.5px;
    }

    .detail-value{
      color:var(--text);
      font-size:1rem;
      font-weight:700;
      margin-top:.25rem;
    }

    .ideas-section h2{
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:2rem;
      margin:0 0 1.25rem 0;
      text-align:center;
    }

    .ideas-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
      gap:1rem;
      margin-bottom:1.5rem;
    }

    .idea-card{
      background:var(--surface-strong);
      border:1px solid var(--border);
      border-radius:14px;
      padding:1rem;
      box-shadow:var(--shadow);
      transition:transform .15s ease, box-shadow .15s ease;
      cursor:pointer;
    }

    .idea-card:hover{
      transform:translateY(-2px);
    }

    .idea-card h3{
      margin:0 0 .5rem 0;
      color:var(--text);
      font-size:1.1rem;
      font-weight:700;
    }

    .idea-card h3 a{
      color:var(--text);
      text-decoration:none;
    }

    .idea-card h3 a:hover{
      text-decoration:underline;
    }

    .idea-card p{
      margin:0;
      color:var(--muted);
      font-size:.95rem;
      line-height:1.4;
      min-height:1.2rem;
    }

    .button-group{
      display:flex;
      gap:.75rem;
      justify-content:center;
      margin-top:1.5rem;
      flex-wrap:wrap;
    }

    @media (max-width:720px){
      .world-details{flex-direction:column; gap:1rem;}
      .ideas-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
  <main class="container" role="main">
    <section class="glass" style="padding:18px; margin-bottom:16px;">
      <h1 id="world-name" class="page-title">Your World</h1>
      <div class="world-details">
        <div class="detail">
          <span class="detail-label">Genre</span>
          <span class="detail-value" id="genre-display">-</span>
        </div>
        <div class="detail">
          <span class="detail-label">Theme</span>
          <span class="detail-value" id="theme-display">-</span>
        </div>
      </div>
    </section>

    <section class="ideas-section">
      <h2>World Building Ideas</h2>
      <div class="ideas-grid" id="ideas-grid"></div>
    </section>

    <div class="button-group">
      <button class="btn btn-muted" onclick="window.location.href='YourWorlds.html'">View All Worlds</button>
      <button class="btn btn-primary" onclick="window.location.href='index.html'">Back Home</button>
    </div>
  </main>

  <script src="supabase-config.js"></script>
  <script>
    const buildingIdeas = [
      { title: "World Overview/Plot Summary", description: "", link: null },
      { title: "Global History/Lore", description: "", link: "GlobalHistoryLore.html" },
      { title: "Realms/Nations", description: "", link: "Kingdoms.html" },
      { title: "Characters", description: "", link: "Characters.html" },
      { title: "Antagonist", description: "", link: "Antagonist.html" },
      { title: "Central Conflict", description: "", link: "CentralConflict.html" },
      { title: "Magic System", description: "", link: "MagicSystem.html" },
      { title: "Outlined Plot", description: "", link: "OutlinedPlot.html" },
      { title: "Setting(s)", description: "", link: null },
      { title: "How Does the Story End? What's Different from the Beginning?", description: "", link: null },
      { title: "Theme(s)", description: "", link: null },
      { title: "Miscellaneous", description: "", link: null }
    ];

    function loadWorld() {
      const world = getCurrentWorld();

      if (world) {
        document.getElementById('world-name').textContent = world.name || "New World";
        document.getElementById('genre-display').textContent = world.genre || "-";
        document.getElementById('theme-display').textContent = world.theme || "-";
      } else {
        document.getElementById('world-name').textContent = "New World";
      }

      const ideasGrid = document.getElementById('ideas-grid');
      ideasGrid.innerHTML = '';

      buildingIdeas.forEach(idea => {
        const card = document.createElement('div');
        card.className = 'idea-card';

        if (idea.link) {
          card.innerHTML = `<h3><a href="${idea.link}">${idea.title}</a></h3><p>${idea.description}</p>`;
          card.onclick = () => window.location.href = idea.link;
        } else {
          card.innerHTML = `<h3>${idea.title}</h3><p>${idea.description}</p>`;
        }

        ideasGrid.appendChild(card);
      });
    }

    window.addEventListener('load', loadWorld);
  </script>
</body>
</html>
