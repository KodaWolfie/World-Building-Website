<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Outlined Plot</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=16">

  <style>
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
    .page-title{margin:0;color:var(--text);font-family:"UnifrakturCook",serif;font-size:clamp(1.9rem,3.3vw,2.6rem);line-height:1.1}
    .world-name{color:var(--muted);font-size:.95rem;margin:.2rem 0 0;font-weight:700}
    .section-title{margin:0 0 .45rem 0;color:var(--text);font-family:"UnifrakturCook",serif;font-size:1.3rem}
    .section-sub{margin:0;color:var(--muted);font-size:.95rem}

    .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:12px}
    .field label{display:block;font-size:.83rem;color:var(--muted);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.35px}
    .field input,.field select,.field textarea{
      width:100%;border:1px solid var(--border);border-radius:10px;padding:.72rem;font:inherit;
      background:rgba(6,18,80,.88);color:var(--text);box-sizing:border-box
    }
    .field textarea{min-height:130px;resize:vertical;grid-column:1/-1;line-height:1.45}
    .field input::placeholder,.field textarea::placeholder{color:rgba(255,230,109,.75)}

    .actions{display:flex;gap:.65rem;flex-wrap:wrap;margin-top:12px}
    .plot-list{margin-top:14px;display:grid;gap:10px}

    .plot-card{
      border:1px solid var(--border);border-radius:12px;padding:12px;
      background:linear-gradient(180deg,rgba(12,34,130,.72),rgba(8,24,100,.65));box-shadow:var(--shadow)
    }
    .plot-meta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:.45rem;color:var(--muted);font-size:.88rem;font-weight:700}
    .plot-role{margin:0 0 .35rem 0;color:var(--text);font-size:1.03rem;font-weight:700}
    .plot-text{margin:0;color:var(--text);white-space:pre-wrap;line-height:1.45}
    .plot-actions{display:flex;justify-content:flex-end;gap:.5rem;flex-wrap:wrap;margin-top:.6rem}
    .empty{color:var(--muted);margin:0;text-align:center;padding:.7rem 0}
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <div>
        <h1 class="page-title">Outlined Plot</h1>
        <p class="world-name" id="worldNameDisplay">World: —</p>
      </div>
      <a class="link-back" href="WorldBuildingIdeas.html">← Back to World Ideas</a>
    </div>

    <section class="glass" style="padding:14px;">
      <h2 class="section-title">Add Plot Point</h2>
      <p class="section-sub">Build your story one idea at a time.</p>

      <div class="form-grid">
        <div class="field">
          <label for="plotSection">Section</label>
          <select id="plotSection">
            <option value="">Select section...</option>
            <option>Opening</option>
            <option>Inciting Incident</option>
            <option>Rising Action</option>
            <option>Midpoint</option>
            <option>Complication</option>
            <option>Climax</option>
            <option>Falling Action</option>
            <option>Resolution</option>
            <option>Chapter</option>
            <option>Other</option>
          </select>
        </div>

        <div class="field">
          <label for="plotRole">Role</label>
          <input id="plotRole" type="text" placeholder="e.g., Turning point, Reveal, Character test">
        </div>

        <div class="field">
          <label for="plotText">Plot</label>
          <textarea id="plotText" placeholder="What happens in this plot point?"></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="addBtn">+ Add Plot Point</button>
        <button class="btn btn-muted" id="clearBtn">Clear All</button>
      </div>
    </section>

    <section class="glass" style="padding:14px; margin-top:14px;">
      <h2 class="section-title">Your Plot Outline</h2>
      <p class="section-sub">Use arrows to reorder plot points.</p>
      <div class="plot-list" id="plotList"></div>
    </section>
  </main>

  <script>
    function getCurrentWorldSafe() {
      try { return JSON.parse(localStorage.getItem('currentWorld') || 'null'); }
      catch { return null; }
    }

    const world = getCurrentWorldSafe();
    const worldName = (world && typeof world.name === "string" && world.name.trim()) ? world.name.trim() : null;
    document.getElementById("worldNameDisplay").textContent = `World: ${worldName || "—"}`;

    // If no world exists, use a neutral key so it doesn't pretend to be "New World"
    const KEY = worldName ? `outlinedPlot:${worldName}` : `outlinedPlot:__no_world_selected__`;

    let plotPoints = loadPlotPoints();

    function loadPlotPoints() {
      try { return JSON.parse(localStorage.getItem(KEY) || "[]"); }
      catch { return []; }
    }

    function savePlotPoints() {
      localStorage.setItem(KEY, JSON.stringify(plotPoints));
    }

    function movePoint(fromIndex, toIndex) {
      if (toIndex < 0 || toIndex >= plotPoints.length) return;
      const [item] = plotPoints.splice(fromIndex, 1);
      plotPoints.splice(toIndex, 0, item);
      savePlotPoints();
      renderPlotPoints();
    }

    function renderPlotPoints() {
      const list = document.getElementById("plotList");
      list.innerHTML = "";

      if (!plotPoints.length) {
        list.innerHTML = `<p class="empty">No plot points yet. Add your first one above.</p>`;
        return;
      }

      plotPoints.forEach((item, index) => {
        const isFirst = index === 0;
        const isLast = index === plotPoints.length - 1;

        const card = document.createElement("article");
        card.className = "plot-card";
        card.innerHTML = `
          <div class="plot-meta">
            <span><strong>Section:</strong> ${item.section || "—"}</span>
            <span><strong>#</strong> ${index + 1}</span>
          </div>
          <p class="plot-role"><strong>Role:</strong> ${item.role || "—"}</p>
          <p class="plot-text"><strong>Plot:</strong> ${item.plot || "—"}</p>
          <div class="plot-actions">
            <button class="btn btn-muted" data-action="up" data-index="${index}" ${isFirst ? "disabled" : ""}>↑ Move Up</button>
            <button class="btn btn-muted" data-action="down" data-index="${index}" ${isLast ? "disabled" : ""}>↓ Move Down</button>
            <button class="btn btn-muted" data-action="delete" data-id="${item.id}">Delete</button>
          </div>
        `;
        list.appendChild(card);
      });
    }

    function resetInputs() {
      document.getElementById("plotSection").value = "";
      document.getElementById("plotRole").value = "";
      document.getElementById("plotText").value = "";
    }

    document.getElementById("addBtn").addEventListener("click", () => {
      const section = document.getElementById("plotSection").value.trim();
      const role = document.getElementById("plotRole").value.trim();
      const plot = document.getElementById("plotText").value.trim();

      if (!section && !role && !plot) {
        alert("Add at least one field before creating a plot point.");
        return;
      }

      plotPoints.push({
        id: Date.now(),
        section,
        role,
        plot
      });

      savePlotPoints();
      renderPlotPoints();
      resetInputs();
    });

    document.getElementById("plotList").addEventListener("click", (e) => {
      const actionBtn = e.target.closest("button[data-action]");
      if (actionBtn) {
        const action = actionBtn.dataset.action;
        const index = Number(actionBtn.dataset.index);
        if (Number.isNaN(index)) return;

        if (action === "up") return movePoint(index, index - 1);
        if (action === "down") return movePoint(index, index + 1);
        return;
      }

      const deleteBtn = e.target.closest("button[data-id]");
      if (!deleteBtn) return;
      const id = Number(deleteBtn.dataset.id);
      plotPoints = plotPoints.filter(p => p.id !== id);
      savePlotPoints();
      renderPlotPoints();
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      if (!confirm("Clear all outlined plot points for this world?")) return;
      plotPoints = [];
      savePlotPoints();
      renderPlotPoints();
      resetInputs();
    });

    renderPlotPoints();
  </script>
</body>
</html>
