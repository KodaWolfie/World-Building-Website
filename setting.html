<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Setting Details</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=16">

  <style>
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
    .page-title{margin:0;color:var(--text);font-family:"UnifrakturCook",serif;font-size:clamp(1.7rem,3vw,2.3rem)}
    .muted{color:var(--muted);margin:0}
    .section-title{margin:0 0 .35rem 0;color:var(--text);font-family:"UnifrakturCook",serif;font-size:1.25rem}
    .freewrite-card{
      margin-top:10px;border:1px solid var(--border);border-radius:14px;padding:12px;
      background:linear-gradient(180deg, rgba(12,34,130,.72), rgba(8,24,100,.65));box-shadow:var(--shadow)
    }
    textarea{
      width:100%;border:1px solid var(--border);border-radius:10px;padding:.75rem;font:inherit;
      line-height:1.45;background:rgba(6,18,80,.88);color:var(--text);resize:vertical;box-sizing:border-box
    }
    textarea::placeholder{color:rgba(255,230,109,.75)}
    #freeWrite{min-height:260px;margin-top:.6rem}

    .questions-grid{
      display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px;
    }
    .question-card{
      border:1px solid var(--border);border-radius:12px;padding:10px;background:rgba(10,26,110,.35)
    }
    .question-card h3{margin:0 0 .45rem 0;color:var(--text);font-size:.98rem;font-weight:700;line-height:1.3}
    .question-card textarea{min-height:130px}

    .actions{display:flex;gap:.65rem;flex-wrap:wrap;margin-top:14px}
    @media(max-width:900px){ .questions-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <h1 id="setting-name" class="page-title">Setting</h1>
      <a class="link-back" href="Settings.html">← Back to Settings</a>
    </div>

    <section class="card" style="margin-bottom:14px;">
      <p id="setting-type" class="muted">Type: —</p>
      <p id="setting-description" style="margin:.4rem 0 0 0; color:var(--text);">No description available.</p>
    </section>

    <section class="glass" style="padding:14px;">
      <h2 class="section-title">Free Write</h2>
      <div class="freewrite-card">
        <textarea id="freeWrite" placeholder="Write freely about this setting..."></textarea>
      </div>

      <h2 class="section-title" style="margin-top:14px;">Guided Questions</h2>
      <div class="questions-grid" id="questionsGrid"></div>

      <div class="actions">
        <button class="btn btn-primary" id="saveBtn">Save</button>
        <button class="btn btn-muted" id="clearBtn">Clear All</button>
      </div>
    </section>
  </main>

  <script>
    // Replace with your own 10 prompts whenever ready
    const QUESTIONS = [
      "1) What is this setting called, and why?",
      "2) What does it look and feel like at first glance?",
      "3) What is the geography and climate?",
      "4) Who holds power here?",
      "5) What is daily life like?",
      "6) What is this place known for?",
      "7) What conflict exists here right now?",
      "8) What danger or secret is hidden here?",
      "9) How does this setting connect to the main plot?",
      "10) What could change this setting forever?"
    ];

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function getCurrentWorldSafe() {
      try { return JSON.parse(localStorage.getItem('currentWorld') || 'null'); }
      catch { return null; }
    }

    const world = getCurrentWorldSafe();
    const worldName = (world && typeof world.name === "string" && world.name.trim()) ? world.name.trim() : null;

    function settingsListKey() {
      return worldName ? `settingsList:${worldName}` : `settingsList:__no_world_selected__`;
    }

    function loadSetting() {
      const settingId = getQueryParam('id');
      const stored = localStorage.getItem(settingsListKey());
      const list = stored ? JSON.parse(stored) : [];

      let setting = null;
      if (settingId) setting = list.find(s => String(s.id) === String(settingId));
      if (!setting) {
        const selected = localStorage.getItem('selectedSetting');
        setting = selected ? JSON.parse(selected) : null;
      }

      if (!setting) {
        document.getElementById('setting-name').textContent = 'Setting Not Found';
        document.getElementById('setting-type').textContent = 'Type: —';
        document.getElementById('setting-description').textContent = 'This setting could not be found.';
        return null;
      }

      document.title = `${setting.name} | Setting Details`;
      document.getElementById('setting-name').textContent = setting.name;
      document.getElementById('setting-type').textContent = `Type: ${setting.type || '—'}`;
      document.getElementById('setting-description').textContent = setting.description || 'No description provided';
      return setting;
    }

    function makeStorageKey(setting) {
      const worldPart = worldName || "__no_world_selected__";
      return `settingProfile:${worldPart}:${setting.id}:${setting.name}`;
    }

    function renderQuestions(saved = {}) {
      const grid = document.getElementById("questionsGrid");
      grid.innerHTML = "";

      QUESTIONS.forEach((q, i) => {
        const id = `q_${i + 1}`;
        const card = document.createElement("article");
        card.className = "question-card";
        card.innerHTML = `
          <h3>${q}</h3>
          <textarea id="${id}" placeholder="Write your answer...">${saved[id] || ""}</textarea>
        `;
        grid.appendChild(card);
      });
    }

    function collectData() {
      const out = { freeWrite: document.getElementById("freeWrite").value || "" };
      QUESTIONS.forEach((_, i) => {
        const id = `q_${i + 1}`;
        out[id] = document.getElementById(id)?.value || "";
      });
      return out;
    }

    function applyData(saved = {}) {
      document.getElementById("freeWrite").value = saved.freeWrite || "";
      renderQuestions(saved);
    }

    function loadSavedProfile(key) {
      try { return JSON.parse(localStorage.getItem(key) || "{}"); }
      catch { return {}; }
    }

    function saveProfile(key) {
      localStorage.setItem(key, JSON.stringify(collectData()));
      alert("Saved!");
    }

    window.addEventListener("load", () => {
      const setting = loadSetting();
      if (!setting) return;

      const storageKey = makeStorageKey(setting);
      applyData(loadSavedProfile(storageKey));

      document.getElementById("saveBtn").addEventListener("click", () => saveProfile(storageKey));
      document.getElementById("clearBtn").addEventListener("click", () => {
        if (!confirm("Clear free write + all 10 answers for this setting?")) return;
        localStorage.removeItem(storageKey);
        applyData({});
      });

      document.addEventListener("input", (e) => {
        if (e.target.matches("#freeWrite, #questionsGrid textarea")) {
          localStorage.setItem(storageKey, JSON.stringify(collectData()));
        }
      });
    });
  </script>
</body>
</html>
