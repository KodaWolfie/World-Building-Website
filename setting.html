<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Setting Details</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=17">

  <style>
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}
    .page-title{margin:0;color:var(--text);font-family:"UnifrakturCook",serif;font-size:clamp(1.7rem,3vw,2.3rem)}
    .muted{color:var(--muted);margin:0}
    .section-title{margin:0 0 .35rem 0;color:var(--text);font-family:"UnifrakturCook",serif;font-size:1.25rem}
    .freewrite-card{
      margin-top:10px;border:1px solid var(--border);border-radius:14px;padding:12px;
      background:linear-gradient(180deg, rgba(12,34,130,.72), rgba(8,24,100,.65));box-shadow:var(--shadow)
    }
    textarea{
      width:100%;border:1px solid var(--border);border-radius:10px;padding:.75rem;font:inherit;
      line-height:1.45;background:rgba(6,18,80,.88);color:var(--text);resize:vertical;box-sizing:border-box
    }
    textarea::placeholder{color:rgba(255,230,109,.75)}
    #freeWrite{min-height:260px;margin-top:.6rem}
    .questions-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}
    .question-card{border:1px solid var(--border);border-radius:12px;padding:10px;background:rgba(10,26,110,.35)}
    .question-card h3{margin:0 0 .45rem 0;color:var(--text);font-size:.98rem;font-weight:700;line-height:1.3}
    .question-card textarea{min-height:130px}
    .actions{display:flex;gap:.65rem;flex-wrap:wrap;margin-top:14px}
    @media(max-width:900px){ .questions-grid{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <h1 id="setting-name" class="page-title">Setting</h1>
      <a class="link-back" href="Settings.html">← Back to Settings</a>
    </div>

    <section class="card" style="margin-bottom:14px;">
      <p id="setting-type" class="muted">Type: —</p>
      <p id="setting-description" style="margin:.4rem 0 0 0; color:var(--text);">No description available.</p>
    </section>

    <section class="glass" style="padding:14px;">
      <h2 class="section-title">Free Write</h2>
      <div class="freewrite-card">
        <textarea id="freeWrite" placeholder="Write freely about this setting..."></textarea>
      </div>

      <h2 class="section-title" style="margin-top:14px;">Guided Questions</h2>
      <div class="questions-grid" id="questionsGrid"></div>

      <div class="actions">
        <button class="btn btn-primary" id="saveBtn">Save</button>
        <button class="btn btn-muted" id="clearBtn">Clear All</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js?v=20"></script>
  <script>
    const QUESTIONS = [
      "1) What is this setting called, and why?",
      "2) What type of place is it? (City, beach, forest, ect)",
      "3) What is the geography and climate?",
      "4) Where is it in the world?",
      "5) Who has power of it?",
      "6) What is daily life for?",
      "7) Sight, smell, sound, touch, taste?",
      "8) What emotions should the reader feel here?",
      "9) What danger or secret is hidden here?",
      "10) What conflict exists here right now?",
      "11) What is this place known for?",
      "12) How does this setting connect to the main plot, theme, characters, ect?"
    ];

    let currentSetting = null;

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function renderQuestions(saved = {}) {
      const grid = document.getElementById("questionsGrid");
      grid.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const id = `q_${i + 1}`;
        const card = document.createElement("article");
        card.className = "question-card";
        card.innerHTML = `
          <h3>${q}</h3>
          <textarea id="${id}" placeholder="Write your answer...">${saved[id] || ""}</textarea>
        `;
        grid.appendChild(card);
      });
    }

    function collectData() {
      const out = { free_write: document.getElementById("freeWrite").value || "", answers: {} };
      QUESTIONS.forEach((_, i) => {
        const id = `q_${i + 1}`;
        out.answers[id] = document.getElementById(id)?.value || "";
      });
      return out;
    }

    function applyData(saved = {}) {
      document.getElementById("freeWrite").value = saved.free_write || "";
      renderQuestions(saved.answers || {});
    }

    async function loadSetting() {
      const settingId = Number(getQueryParam('id'));
      if (!settingId) return null;

      const user = await getCurrentUser();
      if (!user) return null;

      const { data, error } = await sb
        .from('settings')
        .select('id, name, type, description')
        .eq('user_id', user.id)
        .eq('id', settingId)
        .single();

      if (error) return null;
      return data;
    }

    async function loadProfile() {
      const user = await getCurrentUser();
      if (!user || !currentSetting?.id) return {};

      const { data, error } = await sb
        .from('setting_profiles')
        .select('free_write, answers')
        .eq('user_id', user.id)
        .eq('setting_id', currentSetting.id)
        .maybeSingle();

      if (error) return {};
      return data || {};
    }

    async function saveProfile(showAlert = true) {
      const user = await getCurrentUser();
      if (!user || !currentSetting?.id) return;

      const payload = collectData();

      const { error } = await sb
        .from('setting_profiles')
        .upsert([{
          user_id: user.id,
          setting_id: currentSetting.id,
          free_write: payload.free_write,
          answers: payload.answers
        }], { onConflict: 'setting_id' });

      if (error) {
        alert('Error saving setting profile: ' + error.message);
        return;
      }

      if (showAlert) alert("Saved!");
    }

    window.addEventListener("load", async () => {
      renderQuestions({}); // always visible

      currentSetting = await loadSetting();
      if (!currentSetting) {
        document.getElementById('setting-name').textContent = 'Setting Not Found';
        document.getElementById('setting-type').textContent = 'Type: —';
        document.getElementById('setting-description').textContent = 'This setting could not be found.';
        return;
      }

      document.title = `${currentSetting.name} | Setting Details`;
      document.getElementById('setting-name').textContent = currentSetting.name;
      document.getElementById('setting-type').textContent = `Type: ${currentSetting.type || '—'}`;
      document.getElementById('setting-description').textContent = currentSetting.description || 'No description provided';

      const saved = await loadProfile();
      applyData(saved);

      document.getElementById("saveBtn").addEventListener("click", () => saveProfile(true));
      document.getElementById("clearBtn").addEventListener("click", async () => {
        if (!confirm("Clear free write + all answers for this setting?")) return;
        applyData({ free_write: '', answers: {} });
        await saveProfile(false);
      });

      document.addEventListener("input", (e) => {
        if (e.target.matches("#freeWrite, #questionsGrid textarea")) {
          saveProfile(false);
        }
      });
    });
  </script>
</body>
</html>
