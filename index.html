<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Welcome to World Building!</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">

  <!-- Shared theme -->
  <link rel="stylesheet" href="theme.css?v=13">

  <!-- Supabase Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .center{ text-align:center; }

    .page-title{
      margin:0 0 .5rem 0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:clamp(2rem,4vw,3rem);
      line-height:1.05;
    }

    .lead{
      margin:0 0 1.25rem 0;
      color:var(--muted);
      font-size:1rem;
      line-height:1.5;
    }

    .hero-card{
      max-width:700px;
      margin:0 auto;
      padding:1.1rem 1.25rem;
      text-align:center;
    }

    .hero-card h2{
      margin:0;
      font-size:1.2rem;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
    }

    .hero-card p{
      margin:.5rem 0 0 0;
      color:var(--muted);
      font-size:.95rem;
    }

    .auth-row{
      margin-top:1rem;
      display:flex;
      gap:.5rem;
      flex-wrap:wrap;
      align-items:center;
      justify-content:center;
    }

    .auth-row input{
      padding:.6rem .75rem;
      border:1px solid var(--border);
      border-radius:10px;
      min-width:220px;
      font-family:"Old Standard TT", Georgia, "Times New Roman", serif;
      background:rgba(10,26,110,0.85);
      color:var(--text);
    }

    .auth-row input::placeholder{
      color:rgba(255,230,109,.75);
    }

    #authStatus{
      margin-top:.75rem;
      color:var(--muted);
      font-size:.95rem;
    }

    .box-cta{ margin-top:1rem; }

    @media(max-width:720px){
      .auth-row input{ min-width:100%; }
    }
  </style>
</head>
<body>
  <main class="container center" role="main" aria-labelledby="hero-title">
    <header style="margin-bottom:12px;">
      <h1 id="hero-title" class="page-title">Welcome to World Building!</h1>
      <p class="lead">Create, manage, and explore the worlds you imagine.</p>
    </header>

    <section class="glass hero-card" aria-labelledby="your-worlds">
      <h2 id="your-worlds">Your Worlds</h2>
      <p id="description-text">No worlds yet — get started by creating your first world.</p>

      <div class="auth-row">
        <input id="emailInput" type="email" placeholder="you@example.com" />
        <input id="passwordInput" type="password" placeholder="password" />
        <button id="signupBtn" type="button" class="btn btn-muted">Sign Up</button>
        <button id="loginBtn" type="button" class="btn btn-primary">Log In</button>
        <button id="logoutBtn" type="button" class="btn btn-muted">Log Out</button>
      </div>

      <div id="authStatus">Checking login...</div>

      <div class="box-cta">
        <a id="worlds-link" href="CreateWorld.html" style="text-decoration:none;">
          <button id="worlds-btn" class="btn btn-primary">Create World</button>
        </a>
      </div>
    </section>
  </main>

<script src="./supabase-config.js?v=2"></script>
<script>
  function setStatus(msg) {
    document.getElementById('authStatus').textContent = msg;
  }

  async function refreshAuthStatus() {
    try {
      const user = await getCurrentUser();
      setStatus(user ? `Logged in as ${user.email}` : 'Not logged in');
    } catch (e) {
      console.error('refreshAuthStatus error:', e);
      setStatus('Auth check failed. See console.');
    }
  }

  async function updateButtonText() {
    try {
      const user = await getCurrentUser();
      const button = document.getElementById('worlds-btn');
      const link = document.getElementById('worlds-link');
      const description = document.getElementById('description-text');

      if (!user) {
        button.textContent = 'Create World';
        link.href = 'CreateWorld.html';
        description.textContent = 'No worlds yet — get started by creating your first world.';
        return;
      }

      const worlds = await getUserWorlds();
      if (worlds.length > 0) {
        button.textContent = 'Your Worlds';
        link.href = 'YourWorlds.html';
        description.textContent = `You have ${worlds.length} world(s). Explore and create more!`;
      } else {
        button.textContent = 'Create World';
        link.href = 'CreateWorld.html';
        description.textContent = 'No worlds yet — get started by creating your first world.';
      }
    } catch (e) {
      console.error('updateButtonText error:', e);
    }
  }

  function getCredentials() {
    const email = document.getElementById('emailInput').value.trim();
    const password = document.getElementById('passwordInput').value;
    if (!email) { alert('Please enter your email'); return null; }
    if (!password || password.length < 6) { alert('Password must be at least 6 characters'); return null; }
    return { email, password };
  }

  document.getElementById('signupBtn').addEventListener('click', async () => {
    const creds = getCredentials();
    if (!creds) return;
    setStatus('Signing up...');
    try {
      const ok = await signUpWithPassword(creds.email, creds.password);
      if (!ok) { setStatus('Sign up failed.'); return; }
      setStatus('Sign up success. You can log in now.');
      await refreshAuthStatus();
      await updateButtonText();
    } catch (e) {
      console.error('signup error:', e);
      setStatus('Sign up error. See console.');
    }
  });

  document.getElementById('loginBtn').addEventListener('click', async () => {
    const creds = getCredentials();
    if (!creds) return;
    setStatus('Logging in...');
    try {
      const ok = await signInWithPassword(creds.email, creds.password);
      if (!ok) { setStatus('Login failed.'); return; }
      setStatus('Login success.');
      await refreshAuthStatus();
      await updateButtonText();
    } catch (e) {
      console.error('login error:', e);
      setStatus('Login error. See console.');
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    setStatus('Logging out...');
    try {
      const ok = await signOut();
      if (!ok) { setStatus('Logout failed.'); return; }
      setStatus('Logged out.');
      await refreshAuthStatus();
      await updateButtonText();
    } catch (e) {
      console.error('logout error:', e);
      setStatus('Logout error. See console.');
    }
  });

  window.addEventListener('load', async () => {
    // sanity checks
    if (!window.supabase) console.error('Supabase CDN not loaded');
    if (typeof supabase === 'undefined') console.error('supabase client not defined (check supabase-config.js)');
    if (typeof signInWithPassword !== 'function') console.error('signInWithPassword missing (check supabase-config.js)');
    await refreshAuthStatus();
    await updateButtonText();
  });
</script>
</body>
</html>
