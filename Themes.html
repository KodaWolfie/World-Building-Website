<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Themes</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
  <main class="themes-page">
    <h1>Themes</h1>

    <section class="theme-graph" aria-label="Topic and Theme planning graph">
      <div class="graph-header">
        <div class="topic-header">Topic</div>
        <div class="theme-header">Theme</div>
      </div>

      <div class="graph-row">
        <label for="topic-1" class="sr-only">Topic 1</label>
        <textarea id="topic-1" name="topic-1" placeholder="Enter topic..."></textarea>

        <label for="theme-1" class="sr-only">Theme 1</label>
        <textarea id="theme-1" name="theme-1" placeholder="Enter theme details..."></textarea>
      </div>

      <div class="graph-row">
        <label for="topic-2" class="sr-only">Topic 2</label>
        <textarea id="topic-2" name="topic-2" placeholder="Enter topic..."></textarea>

        <label for="theme-2" class="sr-only">Theme 2</label>
        <textarea id="theme-2" name="theme-2" placeholder="Enter theme details..."></textarea>
      </div>

      <div class="graph-row">
        <label for="topic-3" class="sr-only">Topic 3</label>
        <textarea id="topic-3" name="topic-3" placeholder="Enter topic..."></textarea>

        <label for="theme-3" class="sr-only">Theme 3</label>
        <textarea id="theme-3" name="theme-3" placeholder="Enter theme details..."></textarea>
      </div>
    </section>

    <section class="responses" aria-label="Theme development responses">
      <h2>Theme Development</h2>

      <div class="response-group">
        <label for="core-message">Core Message</label>
        <textarea id="core-message" name="core-message" placeholder="What is the main message of this theme?"></textarea>
      </div>

      <div class="response-group">
        <label for="conflict">Conflict / Tension</label>
        <textarea id="conflict" name="conflict" placeholder="What conflict explores this theme?"></textarea>
      </div>

      <div class="response-group">
        <label for="character-impact">Character Impact</label>
        <textarea id="character-impact" name="character-impact" placeholder="How does this theme affect characters?"></textarea>
      </div>

      <div class="response-group">
        <label for="symbolism">Symbolism / Motifs</label>
        <textarea id="symbolism" name="symbolism" placeholder="Any symbols or repeated motifs tied to the theme?"></textarea>
      </div>
    </section>
  </main>
</body>
</html>
