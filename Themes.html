<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Themes</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">

  <!-- Shared theme -->
  <link rel="stylesheet" href="theme.css?v=13">

  <style>
    .page-title{
      margin:0 0 1rem 0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:clamp(1.8rem,3vw,2.4rem);
      line-height:1.1;
      text-align:center;
    }

    .section-title{
      margin:0 0 .85rem 0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:1.55rem;
      line-height:1.1;
    }

    .subtext{
      margin:0 0 1rem 0;
      color:var(--muted);
      font-size:.98rem;
      line-height:1.45;
    }

    /* Graph/Table */
    .themes-graph{
      border:1px solid var(--border);
      border-radius:14px;
      overflow:hidden;
      background:var(--surface-strong);
      box-shadow:var(--shadow);
    }

    .graph-header,
    .graph-row{
      display:grid;
      grid-template-columns:1fr 3fr; /* 1/4 + 3/4 */
    }

    .graph-header{
      background:rgba(255,255,255,.04);
      border-bottom:1px solid var(--border);
    }

    .graph-head{
      padding:.8rem .9rem;
      color:var(--text);
      font-weight:700;
      letter-spacing:.2px;
    }

    .graph-head + .graph-head{
      border-left:1px solid var(--border);
    }

    .graph-row{
      border-bottom:1px solid var(--border);
      min-height:110px;
    }

    /* avoid double border on last row */
    #graph-rows .graph-row:last-child{
      border-bottom:none;
    }

    .cell{
      padding:.65rem;
    }

    .cell + .cell{
      border-left:1px solid var(--border);
    }

    .cell textarea{
      width:100%;
      min-height:86px;
      resize:vertical;
      border:1px solid var(--border);
      border-radius:10px;
      padding:.6rem .7rem;
      background:var(--surface);
      color:var(--text);
      font-family:"Old Standard TT", serif;
      font-size:1rem;
      line-height:1.35;
      outline:none;
      box-sizing:border-box;
    }

    .cell textarea:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(255,255,255,.06);
    }

    .prompt-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:.9rem;
      margin-top:1rem;
    }

    .prompt-card{
      border:1px solid var(--border);
      border-radius:12px;
      padding:.8rem;
      background:var(--surface-strong);
      box-shadow:var(--shadow);
    }

    .prompt-card label{
      display:block;
      color:var(--text);
      font-weight:700;
      margin:0 0 .45rem 0;
    }

    .prompt-card textarea{
      width:100%;
      min-height:92px;
      resize:vertical;
      border:1px solid var(--border);
      border-radius:10px;
      padding:.65rem .75rem;
      background:var(--surface);
      color:var(--text);
      font-family:"Old Standard TT", serif;
      font-size:1rem;
      line-height:1.4;
      outline:none;
      box-sizing:border-box;
    }

    .prompt-card textarea:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(255,255,255,.06);
    }

    .button-group{
      display:flex;
      gap:.75rem;
      justify-content:center;
      margin-top:1.4rem;
      flex-wrap:wrap;
    }

    @media (max-width:760px){
      .graph-header,
      .graph-row{
        grid-template-columns:1fr;
      }

      .graph-head + .graph-head,
      .cell + .cell{
        border-left:none;
        border-top:1px solid var(--border);
      }
    }
  </style>
</head>
<body>
  <main class="container" role="main">
    <section class="glass" style="padding:18px; margin-bottom:16px;">
      <h1 class="page-title">Theme(s)</h1>
      <p class="subtext">
        Map each <strong>Topic</strong> to a deeper <strong>Theme</strong>. Use this page to clarify your message and how it appears in your world.
      </p>

      <h2 class="section-title">Topic → Theme Graph</h2>
      <div class="themes-graph" aria-label="Topic and Theme graph">
        <div class="graph-header">
          <div class="graph-head">Topic</div>
          <div class="graph-head">Theme</div>
        </div>

        <!-- dynamic rows container -->
        <div id="graph-rows">
          <div class="graph-row">
            <div class="cell">
              <textarea placeholder="Example: Power, loyalty, loss..."></textarea>
            </div>
            <div class="cell">
              <textarea placeholder="What statement are you making about this topic?"></textarea>
            </div>
          </div>
        </div>
      </div>

      <div class="button-group" style="margin-top:.9rem;">
        <button type="button" class="btn btn-muted" id="add-graph-row">+ Add Row</button>
      </div>
    </section>

    <section class="glass" style="padding:18px;">
      <h2 class="section-title">Theme Development Questions</h2>

      <div class="prompt-grid">
        <div class="prompt-card">
          <label for="core-message">Core Message</label>
          <textarea id="core-message" placeholder="What does your story ultimately say about this theme?"></textarea>
        </div>

        <div class="prompt-card">
          <label for="conflict-tension">Conflict / Tension</label>
          <textarea id="conflict-tension" placeholder="Which conflict best reveals this theme?"></textarea>
        </div>

        <div class="prompt-card">
          <label for="character-impact">Character Impact</label>
          <textarea id="character-impact" placeholder="How does this theme shape your characters' choices?"></textarea>
        </div>

        <div class="prompt-card">
          <label for="symbols-motifs">Symbols / Motifs</label>
          <textarea id="symbols-motifs" placeholder="What recurring symbol, image, or motif represents this theme?"></textarea>
        </div>
      </div>

      <div class="button-group">
        <button class="btn btn-muted" onclick="window.location.href='WorldBuildingIdeas.html'">Back to Ideas</button>
        <button class="btn btn-primary" onclick="window.location.href='index.html'">Back Home</button>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const rowsContainer = document.getElementById('graph-rows');
      const addBtn = document.getElementById('add-graph-row');

      if (!rowsContainer || !addBtn) return;

      addBtn.addEventListener('click', function () {
        const row = document.createElement('div');
        row.className = 'graph-row';
        row.innerHTML = `
          <div class="cell">
            <textarea placeholder="Another topic..."></textarea>
          </div>
          <div class="cell">
            <textarea placeholder="Theme meaning/details..."></textarea>
          </div>
        `;
        rowsContainer.appendChild(row);
      });
    })();
  </script>
</body>
</html>
