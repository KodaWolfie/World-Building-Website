<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Miscellaneous</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=17">

  <style>
    .topbar{
      display:flex; justify-content:space-between; align-items:center;
      gap:12px; margin-bottom:12px; flex-wrap:wrap;
    }
    .page-title{
      margin:0; color:var(--text); font-family:"UnifrakturCook", serif;
      font-size:clamp(1.9rem,3.2vw,2.6rem); line-height:1.1;
    }
    .world-name{
      color:var(--muted); font-size:.95rem; margin:.2rem 0 0; font-weight:700;
    }

    .sub{
      margin:0; color:var(--muted); font-size:.95rem;
    }

    .toolbar{
      display:flex; gap:.65rem; flex-wrap:wrap; margin-top:12px;
    }

    .sections{
      margin-top:14px;
      display:grid;
      gap:12px;
    }

    .misc-card{
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      background:linear-gradient(180deg, rgba(12,34,130,.72), rgba(8,24,100,.65));
      box-shadow:var(--shadow);
    }

    .misc-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .misc-title{
      flex:1;
      min-width:220px;
    }

    .misc-title input{
      width:100%;
      border:1px solid var(--border);
      border-radius:10px;
      padding:.65rem .7rem;
      font:inherit;
      background:rgba(6,18,80,.88);
      color:var(--text);
      box-sizing:border-box;
      font-weight:700;
    }

    .misc-title input::placeholder{
      color:rgba(255,230,109,.75);
    }

    .misc-card textarea{
      width:100%;
      min-height:220px;
      resize:vertical;
      border:1px solid var(--border);
      border-radius:10px;
      padding:.8rem;
      font:inherit;
      line-height:1.5;
      background:rgba(6,18,80,.88);
      color:var(--text);
      box-sizing:border-box;
    }

    .misc-card textarea::placeholder{
      color:rgba(255,230,109,.75);
    }

    .empty{
      margin:0;
      color:var(--muted);
      text-align:center;
      padding:14px 8px;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <div>
        <h1 class="page-title">Miscellaneous</h1>
        <p class="world-name" id="worldNameDisplay">World: —</p>
      </div>
      <a class="link-back" href="WorldBuildingIdeas.html">← Back to World Ideas</a>
    </div>

    <section class="glass" style="padding:14px;">
      <p class="sub">Create as many free-write sections as you need.</p>

      <div class="toolbar">
        <button class="btn btn-primary" id="createSectionBtn">+ Create Section</button>
        <button class="btn btn-muted" id="clearAllBtn">Clear All</button>
      </div>

      <div id="sections" class="sections"></div>
      <p id="emptyState" class="empty">No sections yet. Click <strong>Create Section</strong> to start.</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js?v=20"></script>
  <script>
    let currentWorld = null;
    let sections = [];

    function getQueryParam(name){
      return new URLSearchParams(window.location.search).get(name);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function makeId() {
      return Date.now() + Math.floor(Math.random() * 1000);
    }

    function renderSections() {
      const container = document.getElementById("sections");
      const emptyState = document.getElementById("emptyState");
      container.innerHTML = "";

      if (!sections.length) {
        emptyState.style.display = "block";
        return;
      }
      emptyState.style.display = "none";

      sections.forEach((sec, index) => {
        const card = document.createElement("article");
        card.className = "misc-card";
        card.innerHTML = `
          <div class="misc-head">
            <div class="misc-title">
              <input
                type="text"
                value="${escapeHtml(sec.title || "")}"
                placeholder="Section title..."
                data-field="title"
                data-index="${index}"
              />
            </div>
            <button class="btn btn-muted" data-action="delete" data-index="${index}">Delete</button>
          </div>
          <textarea
            placeholder="Free write..."
            data-field="content"
            data-index="${index}"
          >${escapeHtml(sec.content || "")}</textarea>
        `;
        container.appendChild(card);
      });
    }

    async function loadSectionsFromSupabase() {
      const user = await getCurrentUser();
      if (!user) {
        alert('Please log in first.');
        return;
      }

      const { data, error } = await sb
        .from('misc_sections')
        .select('sections')
        .eq('user_id', user.id)
        .eq('world_id', currentWorld.id)
        .maybeSingle();

      if (error) {
        alert('Error loading sections: ' + error.message);
        sections = [];
      } else {
        sections = Array.isArray(data?.sections) ? data.sections : [];
      }

      renderSections();
    }

    async function saveSectionsToSupabase() {
      const user = await getCurrentUser();
      if (!user) return;

      const { error } = await sb
        .from('misc_sections')
        .upsert([{
          user_id: user.id,
          world_id: currentWorld.id,
          sections
        }], { onConflict: 'world_id' });

      if (error) {
        alert('Error saving sections: ' + error.message);
      }
    }

    async function init() {
      currentWorld = getCurrentWorld();

      // fallback world from URL/cache, but still requires id from selected world
      const fromUrl = getQueryParam("world")?.trim();
      const fallbackName = currentWorld?.name || fromUrl || localStorage.getItem("lastWorldName") || "—";
      document.getElementById("worldNameDisplay").textContent = `World: ${fallbackName}`;

      if (!currentWorld || !currentWorld.id) {
        alert('Please select a world first.');
        window.location.href = 'YourWorlds.html';
        return;
      }

      localStorage.setItem("lastWorldName", currentWorld.name || '');
      document.getElementById("worldNameDisplay").textContent = `World: ${currentWorld.name || "—"}`;

      await loadSectionsFromSupabase();
    }

    document.getElementById("createSectionBtn").addEventListener("click", async () => {
      sections.push({
        id: makeId(),
        title: "",
        content: ""
      });
      renderSections();
      await saveSectionsToSupabase();
    });

    document.getElementById("sections").addEventListener("input", async (e) => {
      const idx = Number(e.target.dataset.index);
      const field = e.target.dataset.field;
      if (Number.isNaN(idx) || !field || !sections[idx]) return;

      sections[idx][field] = e.target.value;
      await saveSectionsToSupabase();
    });

    document.getElementById("sections").addEventListener("click", async (e) => {
      const btn = e.target.closest("button[data-action='delete']");
      if (!btn) return;
      const idx = Number(btn.dataset.index);
      if (Number.isNaN(idx) || !sections[idx]) return;

      sections.splice(idx, 1);
      renderSections();
      await saveSectionsToSupabase();
    });

    document.getElementById("clearAllBtn").addEventListener("click", async () => {
      if (!confirm("Clear all miscellaneous sections for this world?")) return;
      sections = [];
      renderSections();
      await saveSectionsToSupabase();
    });

    window.addEventListener('load', init);
  </script>
</body>
</html>
