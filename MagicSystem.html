<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Magic System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=16">

  <style>
    .topbar{
      display:flex; justify-content:space-between; align-items:center;
      gap:12px; margin-bottom:12px; flex-wrap:wrap;
    }
    .page-title{
      margin:0; color:var(--text); font-family:"UnifrakturCook", serif;
      font-size:clamp(1.9rem,3.3vw,2.6rem); line-height:1.1;
    }
    .world-name{
      color:var(--muted); font-size:.95rem; margin:.2rem 0 0; font-weight:700;
    }

    .section-title{
      margin:0 0 .4rem 0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:1.35rem;
      line-height:1.1;
    }
    .section-sub{
      margin:0;
      color:var(--muted);
      font-size:.95rem;
    }

    .freewrite-card{
      margin-top:10px;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      background:linear-gradient(180deg, rgba(12,34,130,.72), rgba(8,24,100,.65));
      box-shadow:var(--shadow);
    }

    textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:10px;
      padding:.75rem;
      font:inherit;
      line-height:1.45;
      background:rgba(6,18,80,.88);
      color:var(--text);
      resize:vertical;
      box-sizing:border-box;
    }
    textarea::placeholder{
      color:rgba(255,230,109,.75);
    }

    #freeWrite{
      min-height:260px;
      margin-top:.6rem;
    }

    /* Accordion */
    .accordion{
      margin-top:12px;
      border:1px solid var(--border);
      border-radius:12px;
      overflow:hidden;
      background:var(--surface);
      box-shadow:var(--shadow);
    }

    details{
      border-bottom:1px solid var(--border);
      background:rgba(10,26,110,.35);
    }
    details:last-child{ border-bottom:none; }

    summary{
      list-style:none;
      cursor:pointer;
      padding:12px 14px;
      font-weight:700;
      display:flex;
      justify-content:space-between;
      align-items:center;
      color:var(--text);
      user-select:none;
    }
    summary::-webkit-details-marker{ display:none; }

    summary::after{
      content:"+";
      color:var(--muted);
      font-size:1.1rem;
      line-height:1;
    }
    details[open] summary::after{
      content:"−";
      color:var(--primary);
    }

    .section-body{
      padding:0 14px 14px 14px;
    }
    .section-body textarea{
      min-height:180px;
      margin-top:4px;
    }

    .accordion-actions{
      display:flex; gap:.6rem; flex-wrap:wrap; margin-top:12px;
    }

    .actions{
      display:flex; gap:.65rem; flex-wrap:wrap; margin-top:14px;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <div>
        <h1 class="page-title">Magic System</h1>
        <p class="world-name" id="worldNameDisplay">World: New World</p>
      </div>
      <a class="link-back" href="WorldBuildingIdeas.html">← Back to World Ideas</a>
    </div>

    <section class="glass" style="padding:14px;">
      <h2 class="section-title">Free Write</h2>
      <p class="section-sub">Brain-dump your magic system.</p>

      <div class="freewrite-card">
        <textarea id="freeWrite" placeholder="Free Write: What is magic in this world? Who controls it? What does it cost?"></textarea>
      </div>

      <h2 class="section-title" style="margin-top:14px;">Guided Questions</h2>
      <p class="section-sub">Expand each question and answer as deeply as you want.</p>

      <section class="accordion" id="questionAccordion"></section>

      <div class="accordion-actions">
        <button class="btn btn-muted" id="expandAllBtn">Expand All</button>
        <button class="btn btn-muted" id="collapseAllBtn">Collapse All</button>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="saveBtn">Save</button>
        <button class="btn btn-muted" id="clearBtn">Clear All</button>
      </div>
    </section>
  </main>

  <script>
    // Replace these placeholders with your real 18 questions later
    const QUESTIONS = Array.from({ length: 18 }, (_, i) => `Question ${i + 1}`);

    function getCurrentWorldSafe() {
      try { return JSON.parse(localStorage.getItem('currentWorld') || 'null'); }
      catch { return null; }
    }

    const world = getCurrentWorldSafe();
    const worldName = world?.name || "New World";
    document.getElementById("worldNameDisplay").textContent = `World: ${worldName}`;

    const KEY = `magicSystem:${worldName}`;
    const accordion = document.getElementById("questionAccordion");

    function loadData() {
      try { return JSON.parse(localStorage.getItem(KEY) || "{}"); }
      catch { return {}; }
    }

    function saveData(data) {
      localStorage.setItem(KEY, JSON.stringify(data));
    }

    function renderQuestions(saved = {}) {
      accordion.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const id = `q_${i + 1}`;
        const details = document.createElement("details");
        details.innerHTML = `
          <summary>${i + 1}. ${q}</summary>
          <div class="section-body">
            <textarea id="${id}" placeholder="Write your answer...">${saved[id] || ""}</textarea>
          </div>
        `;
        accordion.appendChild(details);
      });
    }

    function collectData() {
      const out = { freeWrite: document.getElementById("freeWrite").value || "" };
      QUESTIONS.forEach((_, i) => {
        const id = `q_${i + 1}`;
        out[id] = document.getElementById(id)?.value || "";
      });
      return out;
    }

    function applyData(data) {
      document.getElementById("freeWrite").value = data.freeWrite || "";
      renderQuestions(data);
    }

    document.getElementById("expandAllBtn").addEventListener("click", () => {
      document.querySelectorAll("#questionAccordion details").forEach(d => d.open = true);
    });

    document.getElementById("collapseAllBtn").addEventListener("click", () => {
      document.querySelectorAll("#questionAccordion details").forEach(d => d.open = false);
    });

    document.getElementById("saveBtn").addEventListener("click", () => {
      saveData(collectData());
      alert("Saved!");
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      if (!confirm("Clear free write + all 18 answers for this world?")) return;
      localStorage.removeItem(KEY);
      applyData({});
    });

    document.addEventListener("input", (e) => {
      if (e.target.matches("#freeWrite, #questionAccordion textarea")) {
        saveData(collectData());
      }
    });

    applyData(loadData());
  </script>
</body>
</html>
