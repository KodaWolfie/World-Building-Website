<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Magic System</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=16">

  <style>
    .topbar{
      display:flex; justify-content:space-between; align-items:center;
      gap:12px; margin-bottom:12px; flex-wrap:wrap;
    }
    .page-title{
      margin:0; color:var(--text); font-family:"UnifrakturCook", serif;
      font-size:clamp(1.9rem,3.3vw,2.6rem); line-height:1.1;
    }
    .world-name{
      color:var(--muted); font-size:.95rem; margin:.2rem 0 0; font-weight:700;
    }

    .section-title{
      margin:0 0 .4rem 0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:1.35rem;
      line-height:1.1;
    }
    .section-sub{
      margin:0;
      color:var(--muted);
      font-size:.95rem;
    }

    .freewrite-card{
      margin-top:10px;
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px;
      background:linear-gradient(180deg, rgba(12,34,130,.72), rgba(8,24,100,.65));
      box-shadow:var(--shadow);
    }

    textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:10px;
      padding:.75rem;
      font:inherit;
      line-height:1.45;
      background:rgba(6,18,80,.88);
      color:var(--text);
      resize:vertical;
      box-sizing:border-box;
    }
    textarea::placeholder{
      color:rgba(255,230,109,.75);
    }

    #freeWrite{
      min-height:260px;
      margin-top:.6rem;
    }

    .accordion{
      margin-top:12px;
      border:1px solid var(--border);
      border-radius:12px;
      overflow:hidden;
      background:var(--surface);
      box-shadow:var(--shadow);
    }

    details{
      border-bottom:1px solid var(--border);
      background:rgba(10,26,110,.35);
    }
    details:last-child{ border-bottom:none; }

    summary{
      list-style:none;
      cursor:pointer;
      padding:12px 14px;
      font-weight:700;
      display:flex;
      justify-content:space-between;
      align-items:center;
      color:var(--text);
      user-select:none;
    }
    summary::-webkit-details-marker{ display:none; }

    summary::after{
      content:"+";
      color:var(--muted);
      font-size:1.1rem;
      line-height:1;
    }
    details[open] summary::after{
      content:"−";
      color:var(--primary);
    }

    .section-body{
      padding:0 14px 14px 14px;
    }
    .section-body textarea{
      min-height:180px;
      margin-top:4px;
    }

    .accordion-actions{
      display:flex; gap:.6rem; flex-wrap:wrap; margin-top:12px;
    }

    .actions{
      display:flex; gap:.65rem; flex-wrap:wrap; margin-top:14px;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <div>
        <h1 class="page-title">Magic System</h1>
        <p class="world-name" id="worldNameDisplay">World: New World</p>
      </div>
      <a class="link-back" href="WorldBuildingIdeas.html">← Back to World Ideas</a>
    </div>

    <section class="glass" style="padding:14px;">
      <h2 class="section-title">Free Write</h2>
      <p class="section-sub">Brain-dump your magic system.</p>

      <div class="freewrite-card">
        <textarea id="freeWrite" placeholder="Free Write: What is magic in this world? Who controls it? What does it cost?"></textarea>
      </div>

      <h2 class="section-title" style="margin-top:14px;">Guided Questions</h2>
      <p class="section-sub">Expand each question and answer as deeply as you want.</p>

      <section class="accordion" id="questionAccordion"></section>

      <div class="accordion-actions">
        <button class="btn btn-muted" id="expandAllBtn">Expand All</button>
        <button class="btn btn-muted" id="collapseAllBtn">Collapse All</button>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="saveBtn">Save</button>
        <button class="btn btn-muted" id="clearBtn">Clear All</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js?v=20"></script>
  <script>
    const QUESTIONS = [
      "Core Concept?",
      "Where does it come from?",
      "What are the laws of magic?",
      "Who in society can use it?",
      "Can animals or plants or anything else other than society use it?",
      "Can it be lost?",
      "How is it learned?",
      "Can it be controlled or harnessed?",
      "What does it feel like?",
      "What exactly does it do?",
      "How is it used?",
      "What are its limitations?",
      "What are its flaws or cost?",
      "How does it relate to the plot, theme, characters, etc?",
      "How do societies react to it?",
      "Is there a cultural impact?",
      "Why haven’t people with powers taken over the world—or have they?",
      "Other?"
    ];

    const accordion = document.getElementById("questionAccordion");
    let currentWorld = null;

    function renderQuestions(saved = {}) {
      accordion.innerHTML = "";
      QUESTIONS.forEach((q, i) => {
        const id = `q_${i + 1}`;
        const details = document.createElement("details");
        details.innerHTML = `
          <summary>${i + 1}. ${q}</summary>
          <div class="section-body">
            <textarea id="${id}" placeholder="Write your answer...">${saved[id] || ""}</textarea>
          </div>
        `;
        accordion.appendChild(details);
      });
    }

    function collectData() {
      const out = { free_write: document.getElementById("freeWrite").value || "", answers: {} };
      QUESTIONS.forEach((_, i) => {
        const id = `q_${i + 1}`;
        out.answers[id] = document.getElementById(id)?.value || "";
      });
      return out;
    }

    function applyData(data) {
      document.getElementById("freeWrite").value = data?.free_write || "";
      renderQuestions(data?.answers || {});
    }

    async function loadFromSupabase() {
      currentWorld = getCurrentWorld();
      const worldName = currentWorld?.name || "New World";
      document.getElementById("worldNameDisplay").textContent = `World: ${worldName}`;

      if (!currentWorld || !currentWorld.id) {
        alert('Please select a world first.');
        window.location.href = 'YourWorlds.html';
        return false;
      }

      const user = await getCurrentUser();
      if (!user) {
        alert('Please log in first.');
        return false;
      }

      const { data, error } = await sb
        .from('magic_systems')
        .select('free_write, answers')
        .eq('user_id', user.id)
        .eq('world_id', currentWorld.id)
        .maybeSingle();

      if (error) {
        alert('Error loading magic system: ' + error.message);
        applyData({ free_write: '', answers: {} });
        return false;
      }

      applyData(data || { free_write: '', answers: {} });
      return true;
    }

    async function saveToSupabase(showAlert = false) {
      if (!currentWorld || !currentWorld.id) return;

      const user = await getCurrentUser();
      if (!user) return;

      const payload = collectData();

      const { error } = await sb
        .from('magic_systems')
        .upsert([{
          user_id: user.id,
          world_id: currentWorld.id,
          free_write: payload.free_write,
          answers: payload.answers
        }], { onConflict: 'world_id' });

      if (error) {
        alert('Error saving magic system: ' + error.message);
        return;
      }

      if (showAlert) alert("Saved!");
    }

    document.getElementById("expandAllBtn").addEventListener("click", () => {
      document.querySelectorAll("#questionAccordion details").forEach(d => d.open = true);
    });

    document.getElementById("collapseAllBtn").addEventListener("click", () => {
      document.querySelectorAll("#questionAccordion details").forEach(d => d.open = false);
    });

    document.getElementById("saveBtn").addEventListener("click", async () => {
      await saveToSupabase(true);
    });

    document.getElementById("clearBtn").addEventListener("click", async () => {
      if (!confirm("Clear free write + all 18 answers for this world?")) return;
      applyData({ free_write: '', answers: {} });
      await saveToSupabase(false);
    });

    document.addEventListener("input", async (e) => {
      if (e.target.matches("#freeWrite, #questionAccordion textarea")) {
        await saveToSupabase(false);
      }
    });

    window.addEventListener('load', loadFromSupabase);
  </script>
</body>
</html>
