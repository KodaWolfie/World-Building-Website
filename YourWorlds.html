<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Your Worlds</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">

  <!-- Shared theme -->
  <link rel="stylesheet" href="theme.css?v=13">

  <!-- Supabase Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .header-container{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:1rem;
      gap:.75rem;
      flex-wrap:wrap;
    }

    .page-title{
      margin:0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-weight:700;
      font-size:clamp(1.8rem,3vw,2.4rem);
      line-height:1.1;
    }

    .worlds-container{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:1rem;
      margin-top:1rem;
    }

    .world-card{
      cursor:pointer;
      transition:transform .15s ease;
    }

    .world-card:hover{
      transform:translateY(-2px);
    }

    .world-name{
      margin:0 0 .5rem 0;
      color:var(--text);
      font-weight:700;
      font-size:1.1rem;
      word-break:break-word;
    }

    .detail{
      margin:.5rem 0;
      font-size:.9rem;
    }

    .label{
      color:var(--muted);
      font-weight:700;
      font-size:.8rem;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .value{
      color:var(--text);
      margin-top:.2rem;
      font-weight:700;
      word-break:break-word;
    }

    .card-actions{
      display:flex;
      gap:.5rem;
      margin-top:.9rem;
      flex-wrap:wrap;
    }

    .card-actions .btn{
      flex:1;
      min-width:95px;
    }

    .empty-state{
      padding:22px;
      text-align:center;
    }

    .empty-state h2{
      color:var(--text);
      font-size:1.2rem;
      margin:0 0 1rem 0;
    }

    .empty-state p{
      color:var(--muted);
      margin:0 0 1rem 0;
    }

    .loading{
      text-align:center;
      color:var(--text);
      font-size:1rem;
      padding:1rem;
    }

    .status{
      margin-top:1rem;
      text-align:center;
      font-weight:700;
      display:none;
    }

    .status.error{ color:#ffb3b3; }
    .status.success{ color:#b6ffbe; }

    @media(max-width:720px){
      .worlds-container{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <main class="container" role="main">
    <div class="header-container">
      <h1 class="page-title">Your Worlds</h1>
      <a href="CreateWorld.html" style="text-decoration:none;">
        <button class="btn btn-primary" title="Create a new world">+ New</button>
      </a>
    </div>

    <!-- Shows when user has no worlds -->
    <section class="glass empty-state" id="no-worlds-section">
      <h2>No Worlds Yet</h2>
      <p>Get started by creating your first world.</p>
      <a href="CreateWorld.html" style="text-decoration:none;">
        <button class="btn btn-primary">Create World</button>
      </a>
    </section>

    <!-- Shows when user has worlds -->
    <section class="worlds-container" id="worlds-list" style="display:none;"></section>

    <!-- Loading -->
    <div class="loading" id="loading" style="display:none;">Loading your worlds...</div>

    <!-- Status -->
    <div id="status" class="status"></div>
  </main>

  <script src="supabase-config.js"></script>
  <script>
    function showStatus(message, type = 'success') {
      const el = document.getElementById('status');
      el.className = `status ${type}`;
      el.textContent = message;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    async function handleDelete(world) {
      if (!world?.id) {
        showStatus('Cannot delete: missing world id.', 'error');
        return;
      }

      const confirmed = confirm(`Delete "${world.world_name}"? This cannot be undone.`);
      if (!confirmed) return;

      const ok = await deleteWorldById(world.id);
      if (!ok) {
        showStatus('Delete failed. Please try again.', 'error');
        return;
      }

      showStatus('World deleted.');
      await loadWorlds();
    }

    async function handleEdit(world) {
      if (!world?.id) {
        showStatus('Cannot edit: missing world id.', 'error');
        return;
      }

      const nextName = prompt('Edit World Name:', world.world_name || '');
      if (nextName === null) return;

      const nextGenre = prompt('Edit Genre:', world.genre || '');
      if (nextGenre === null) return;

      const nextTheme = prompt('Edit Theme:', world.theme || '');
      if (nextTheme === null) return;

      const worldName = nextName.trim();
      const genre = nextGenre.trim();
      const theme = nextTheme.trim();

      if (!worldName) {
        showStatus('World name cannot be empty.', 'error');
        return;
      }

      const ok = await updateWorld(world.id, worldName, genre, theme);
      if (!ok) {
        showStatus('Update failed. Please try again.', 'error');
        return;
      }

      showStatus('World updated.');
      await loadWorlds();
    }

    async function loadWorlds() {
      const loading = document.getElementById('loading');
      const noWorldsSection = document.getElementById('no-worlds-section');
      const worldsList = document.getElementById('worlds-list');

      loading.style.display = 'block';
      const worlds = await getUserWorlds();
      loading.style.display = 'none';

      if (!worlds || worlds.length === 0) {
        noWorldsSection.style.display = 'block';
        worldsList.style.display = 'none';
        worldsList.innerHTML = '';
        return;
      }

      noWorldsSection.style.display = 'none';
      worldsList.style.display = 'grid';
      worldsList.innerHTML = '';

      worlds.forEach(world => {
        const card = document.createElement('div');
        card.className = 'card world-card';

        card.addEventListener('click', () => {
          setCurrentWorld(world.world_name || '', world.genre || '', world.theme || '');
          window.location.href = 'WorldBuildingIdeas.html';
        });

        card.innerHTML = `
          <h3 class="world-name">${escapeHtml(world.world_name || 'Untitled World')}</h3>

          <div class="detail">
            <div class="label">Genre</div>
            <div class="value">${escapeHtml(world.genre || '-')}</div>
          </div>

          <div class="detail">
            <div class="label">Theme</div>
            <div class="value">${escapeHtml(world.theme || '-')}</div>
          </div>

          <div class="card-actions">
            <button type="button" class="btn btn-muted edit-btn">Edit</button>
            <button type="button" class="btn btn-primary delete-btn">Delete</button>
          </div>
        `;

        card.querySelector('.edit-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          handleEdit(world);
        });

        card.querySelector('.delete-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          handleDelete(world);
        });

        worldsList.appendChild(card);
      });
    }

    window.addEventListener('load', loadWorlds);
  </script>
</body>
</html>
