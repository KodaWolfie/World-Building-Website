<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Your Worlds</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">

  <!-- Shared theme -->
  <link rel="stylesheet" href="theme.css?v=13">

  <!-- Supabase Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* Layout-only styles (theme colors come from theme.css) */
    .header-container{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:1rem;
      gap:.75rem;
      flex-wrap:wrap;
    }

    .page-title{
      margin:0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-weight:700;
      font-size:clamp(1.8rem,3vw,2.4rem);
      line-height:1.1;
    }

    .worlds-container{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:1rem;
      margin-top:1rem;
    }

    .world-card{
      cursor:pointer;
      transition:transform .15s ease;
    }

    .world-card:hover{
      transform:translateY(-2px);
    }

    .world-name{
      margin:0 0 .5rem 0;
      color:var(--text);
      font-weight:700;
      font-size:1.1rem;
    }

    .detail{
      margin:.5rem 0;
      font-size:.9rem;
    }

    .label{
      color:var(--muted);
      font-weight:700;
      font-size:.8rem;
      text-transform:uppercase;
      letter-spacing:.4px;
    }

    .value{
      color:var(--text);
      margin-top:.2rem;
      font-weight:700;
    }

    .empty-state{
      padding:22px;
      text-align:center;
    }

    .empty-state h2{
      color:var(--text);
      font-size:1.2rem;
      margin:0 0 1rem 0;
    }

    .empty-state p{
      color:var(--muted);
      margin:0 0 1rem 0;
    }

    .loading{
      text-align:center;
      color:var(--text);
      font-size:1rem;
      padding:1rem;
    }

    @media(max-width:720px){
      .worlds-container{ grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
  <main class="container" role="main">
    <div class="header-container">
      <h1 class="page-title">Your Worlds</h1>
      <a href="CreateWorld.html" style="text-decoration:none;">
        <button class="btn btn-primary" title="Create a new world">+ New</button>
      </a>
    </div>

    <!-- Shows when user has no worlds -->
    <section class="glass empty-state" id="no-worlds-section">
      <h2>No Worlds Yet</h2>
      <p>Get started by creating your first world.</p>
      <a href="CreateWorld.html" style="text-decoration:none;">
        <button class="btn btn-primary">Create World</button>
      </a>
    </section>

    <!-- Shows when user has worlds -->
    <section class="worlds-container" id="worlds-list" style="display:none;"></section>

    <!-- Loading -->
    <div class="loading" id="loading" style="display:none;">
      Loading your worlds...
    </div>
  </main>

  <script src="supabase-config.js"></script>
  <script>
    async function loadWorlds() {
      document.getElementById('loading').style.display = 'block';

      const worlds = await getUserWorlds();

      document.getElementById('loading').style.display = 'none';

      if (!worlds || worlds.length === 0) {
        document.getElementById('no-worlds-section').style.display = 'block';
        document.getElementById('worlds-list').style.display = 'none';
      } else {
        document.getElementById('no-worlds-section').style.display = 'none';
        document.getElementById('worlds-list').style.display = 'grid';

        const worldsList = document.getElementById('worlds-list');
        worldsList.innerHTML = '';

        worlds.forEach(world => {
          const card = document.createElement('div');
          card.className = 'card world-card';
          card.onclick = () => {
            setCurrentWorld(world.world_name, world.genre, world.theme);
            window.location.href = 'WorldBuildingIdeas.html';
          };

          card.innerHTML = `
            <h3 class="world-name">${world.world_name}</h3>
            <div class="detail">
              <div class="label">Genre</div>
              <div class="value">${world.genre || '-'}</div>
            </div>
            <div class="detail">
              <div class="label">Theme</div>
              <div class="value">${world.theme || '-'}</div>
            </div>
          `;

          worldsList.appendChild(card);
        });
      }
    }

    window.addEventListener('load', loadWorlds);
  </script>
</body>
</html>
