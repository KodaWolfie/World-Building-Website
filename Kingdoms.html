<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kingdoms/Countries/Sovereignties</title>

  <!-- Preconnect and Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">

  <!-- Supabase Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#f7fbff;
      --card:#ffffff;
      --card-alpha: 0.92;
      --text:#0f1724;
      --muted:#6b7280;
      --accent:#0b84ff;
      --radius:12px;
      --max-width:900px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "Old Standard TT", Georgia, "Times New Roman", serif;
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      background-image: url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1700&q=80');
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      position: relative;
    }

    body::before{
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.28);
      pointer-events: none;
      z-index: 0;
    }

    .wrap{
      max-width:var(--max-width);
      margin:6vh auto;
      padding:1.25rem;
      position: relative;
      z-index: 1;
    }

    .world-header {
      background: rgba(255,255,255,0.92);
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: 0 6px 18px rgba(15,23,36,0.12);
      border: 1px solid rgba(11,132,255,0.06);
      margin-bottom: 2rem;
      backdrop-filter: blur(2px);
    }

    .world-header h1 {
      margin: 0 0 0.5rem 0;
      color: var(--accent);
      font-size: 1.8rem;
      font-family: "UnifrakturCook", serif;
    }

    .world-details {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }

    .detail {
      display: flex;
      flex-direction: column;
    }

    .detail-label {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail-value {
      color: var(--text);
      font-size: 1rem;
      font-weight: 500;
      margin-top: 0.25rem;
    }

    .header-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .h-blackletter {
      font-family: "UnifrakturCook", serif;
      font-weight: 700;
      font-style: normal;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: 0;
      text-shadow: 0 0.8px 0 rgba(0,0,0,0.02);
      color: #fff7e6;
      margin: 0;
      font-size: 2.4rem;
      line-height: 1.05;
    }

    .add-kingdom-btn {
      background: var(--accent);
      color: white;
      border: none;
      width: 50px;
      height: 50px;
      border-radius: 8px;
      font-size: 1.8rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
    }

    .add-kingdom-btn:hover {
      background: #0968d6;
      box-shadow: 0 4px 12px rgba(11,132,255,0.3);
    }

    .kingdoms-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-top: 2rem;
    }

    .kingdom-card {
      background: rgba(255,255,255,var(--card-alpha));
      border-radius: var(--radius);
      padding: 1.5rem;
      box-shadow: 0 6px 18px rgba(15,23,36,0.12);
      border: 1px solid rgba(11,132,255,0.06);
      backdrop-filter: blur(2px);
      transition: all 0.2s ease;
    }

    .kingdom-card:hover {
      box-shadow: 0 8px 24px rgba(11,132,255,0.18);
    }

    .kingdom-card h3 {
      margin: 0 0 0.5rem 0;
      color: var(--accent);
      font-weight: 700;
      font-size: 1.1rem;
    }

    .kingdom-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .kingdom-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .kingdom-link:focus-visible .kingdom-card {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .no-kingdoms {
      background: rgba(255,255,255,var(--card-alpha));
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      box-shadow: 0 6px 18px rgba(15,23,36,0.12);
      border: 1px solid rgba(11,132,255,0.06);
      backdrop-filter: blur(2px);
    }

    .no-kingdoms h2 {
      color: var(--accent);
      font-size: 1.2rem;
      margin: 0 0 1rem 0;
    }

    .no-kingdoms p {
      color: var(--muted);
      margin: 0 0 1.5rem 0;
    }

    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: "Old Standard TT", Georgia, "Times New Roman", serif;
    }

    button:hover {
      background: #0968d6;
      box-shadow: 0 4px 12px rgba(11,132,255,0.3);
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.4);
    }

    .modal-content {
      background-color: var(--card);
      margin: 5% auto;
      padding: 2rem;
      border: 1px solid rgba(11,132,255,0.06);
      border-radius: var(--radius);
      width: 90%;
      max-width: 500px;
      box-shadow: 0 8px 24px rgba(15,23,36,0.2);
    }

    .modal-header {
      font-size: 1.5rem;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 1rem;
      font-family: "UnifrakturCook", serif;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text);
      font-weight: 600;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid rgba(11,132,255,0.2);
      border-radius: 8px;
      font-family: "Old Standard TT", Georgia, "Times New Roman", serif;
      font-size: 0.95rem;
      box-sizing: border-box;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }

    .modal-buttons {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    .modal-buttons button {
      padding: 0.75rem 1.5rem;
    }

    .close-btn {
      background: var(--muted);
    }

    .close-btn:hover {
      background: #5a6270;
    }

    @media(max-width:720px){
      body{ background-attachment: scroll; }
      .wrap{ margin: 4vh 1rem; }
      .h-blackletter{ font-size: 2rem; }
      .kingdoms-container {
        grid-template-columns: 1fr;
      }
      .world-details {
        flex-direction: column;
        gap: 1rem;
      }
    }
  </style>
</head>
<body>
  <main class="wrap" role="main">
    <div class="world-header">
      <h1 id="world-name">Your World</h1>
      <div class="world-details">
        <div class="detail">
          <span class="detail-label">Genre</span>
          <span class="detail-value" id="genre-display">-</span>
        </div>
        <div class="detail">
          <span class="detail-label">Theme</span>
          <span class="detail-value" id="theme-display">-</span>
        </div>
      </div>
    </div>

    <div class="header-container">
      <h1 class="h-blackletter">Kingdoms/Countries/Sovereignties</h1>
      <button class="add-kingdom-btn" title="Create a new kingdom" onclick="openKingdomModal()">+</button>
    </div>

    <!-- This section will show when user has no kingdoms -->
    <div class="no-kingdoms" id="no-kingdoms-section">
      <h2>No Kingdoms Yet</h2>
      <p>Get started by creating your first kingdom.</p>
      <button onclick="openKingdomModal()">Create Kingdom</button>
    </div>

    <!-- This section will show when user has kingdoms -->
    <div class="kingdoms-container" id="kingdoms-list" style="display: none;">
      <!-- Kingdom cards will be populated here by JavaScript -->
    </div>
  </main>

  <!-- Create Kingdom Modal -->
  <div id="kingdomModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">Create a New Kingdom</div>
      
      <div class="form-group">
        <label for="kingdom-name">Kingdom Name</label>
        <input type="text" id="kingdom-name" placeholder="Enter kingdom name">
      </div>

      <div class="form-group">
        <label for="kingdom-type">Type (e.g., Monarchy, Republic, Empire)</label>
        <input type="text" id="kingdom-type" placeholder="Enter government type">
      </div>

      <div class="form-group">
        <label for="kingdom-description">Description</label>
        <textarea id="kingdom-description" placeholder="Describe your kingdom..."></textarea>
      </div>

      <div class="modal-buttons">
        <button class="close-btn" onclick="closeKingdomModal()">Cancel</button>
        <button onclick="saveKingdom()">Create Kingdom</button>
      </div>
    </div>
  </div>

  <script src="supabase-config.js"></script>
  <script>
    let kingdoms = [];

    // Create a URL-safe slug from a kingdom name
    function slugify(text) {
      return text
        .toString()
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-');
    }

    // Save selected kingdom to localStorage and navigate to details page
    function openKingdomPage(kingdomId) {
      const selectedKingdom = kingdoms.find(k => String(k.id) === String(kingdomId));
      if (!selectedKingdom) return;

      localStorage.setItem('selectedKingdom', JSON.stringify(selectedKingdom));
      window.location.href = `CountryTemplate.html?id=${selectedKingdom.id}&name=${encodeURIComponent(slugify(selectedKingdom.name))}`;
    }

    // Load world data and kingdoms
    function loadWorld() {
      const world = getCurrentWorld();
      
      if (world) {
        document.getElementById('world-name').textContent = world.name;
        document.getElementById('genre-display').textContent = world.genre;
        document.getElementById('theme-display').textContent = world.theme;
      }

      loadKingdoms();
    }

    // Load kingdoms from localStorage
    function loadKingdoms() {
      const storedKingdoms = localStorage.getItem('kingdoms');
      kingdoms = storedKingdoms ? JSON.parse(storedKingdoms) : [];
      
      displayKingdoms();
    }

    // Display kingdoms or no-kingdoms message
    function displayKingdoms() {
      const noKingdomsSection = document.getElementById('no-kingdoms-section');
      const kingdomsList = document.getElementById('kingdoms-list');

      if (kingdoms.length === 0) {
        noKingdomsSection.style.display = 'block';
        kingdomsList.style.display = 'none';
      } else {
        noKingdomsSection.style.display = 'none';
        kingdomsList.style.display = 'grid';
        kingdomsList.innerHTML = '';

        kingdoms.forEach((kingdom) => {
          const link = document.createElement('a');
          link.className = 'kingdom-link';
          link.href = `countries/CountryTemplate.html?id=${kingdom.id}&name=${encodeURIComponent(slugify(kingdom.name))}`;
          link.setAttribute('aria-label', `Open ${kingdom.name}`);
          link.addEventListener('click', (event) => {
            event.preventDefault();
            openKingdomPage(kingdom.id);
          });

          const card = document.createElement('div');
          card.className = 'kingdom-card';
          card.innerHTML = `
            <h3>${kingdom.name}</h3>
            <p><strong>Type:</strong> ${kingdom.type}</p>
            <p>${kingdom.description}</p>
          `;

          link.appendChild(card);
          kingdomsList.appendChild(link);
        });
      }
    }

    // Open create kingdom modal
    function openKingdomModal() {
      document.getElementById('kingdomModal').style.display = 'block';
      // Clear form
      document.getElementById('kingdom-name').value = '';
      document.getElementById('kingdom-type').value = '';
      document.getElementById('kingdom-description').value = '';
    }

    // Close create kingdom modal
    function closeKingdomModal() {
      document.getElementById('kingdomModal').style.display = 'none';
    }

    // Save kingdom to localStorage
    function saveKingdom() {
      const name = document.getElementById('kingdom-name').value.trim();
      const type = document.getElementById('kingdom-type').value.trim();
      const description = document.getElementById('kingdom-description').value.trim();

      if (!name) {
        alert('Please enter a kingdom name');
        return;
      }

      const newKingdom = {
        id: Date.now(),
        name: name,
        type: type || 'Unknown',
        description: description || 'No description provided'
      };

      kingdoms.push(newKingdom);
      localStorage.setItem('kingdoms', JSON.stringify(kingdoms));

      closeKingdomModal();
      displayKingdoms();
    }

    // Close modal when clicking outside
    window.onclick = function(event) {
      const modal = document.getElementById('kingdomModal');
      if (event.target == modal) {
        modal.style.display = 'none';
      }
    }

    // Load on page load
    window.addEventListener('load', loadWorld);
  </script>
</body>
</html>
