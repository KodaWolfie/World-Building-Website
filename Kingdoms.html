<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kingdoms</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=15">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .page-title{margin:0;color:var(--text);font-family:"UnifrakturCook",serif;font-size:clamp(1.6rem,3vw,2.4rem);line-height:1.1}
    .meta-grid{display:flex;gap:24px;flex-wrap:wrap}
    .meta-label{color:var(--muted);font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
    .meta-value{color:var(--text);font-weight:700;margin-top:4px}
    .section-row{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
    .empty-state{padding:22px;text-align:center}
    .empty-state h2{margin-top:0;color:var(--text)}
    .empty-state p{color:var(--muted)}
    #kingdoms-list{display:none;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;margin-top:12px}
    .kingdom-link{text-decoration:none;color:inherit;display:block}
    .kingdom-link:focus-visible .card{outline:2px solid var(--primary);outline-offset:2px}
    .kingdom-name{margin:0 0 .5rem 0;color:var(--text);font-weight:700;font-size:1.1rem}
    .kingdom-text{margin:.25rem 0;color:var(--muted);font-size:.95rem}
    @media (max-width:720px){.meta-grid{gap:14px}}
  </style>
</head>
<body>
  <main class="container" role="main">
    <div style="margin-bottom:12px;">
      <a class="link-back" href="WorldBuildingIdeas.html">← Return to Novel Index</a>
    </div>

    <section class="glass" style="padding:18px; margin-bottom:16px;">
      <h1 id="world-name" class="page-title">Your World</h1>
      <div class="meta-grid" style="margin-top:10px;">
        <div><div class="meta-label">Genre</div><div class="meta-value" id="genre-display">-</div></div>
        <div><div class="meta-label">Theme</div><div class="meta-value" id="theme-display">-</div></div>
      </div>
    </section>

    <section class="section-row">
      <h1 class="page-title" style="font-size:clamp(1.4rem,2.6vw,2rem);">Kingdoms</h1>
      <button class="btn btn-primary" onclick="window.location.href='Kingdom.html?new=1'">+ New</button>
    </section>

    <section class="glass empty-state" id="no-kingdoms-section">
      <h2>No Kingdoms Yet</h2>
      <p>Get started by creating your first kingdom.</p>
      <button class="btn btn-primary" onclick="window.location.href='Kingdom.html?new=1'">Create Kingdom</button>
    </section>

    <section id="kingdoms-list"></section>
  </main>

  <script src="./supabase-config.js?v=20"></script>
  <script>
    let kingdoms = [];
    let currentWorld = null;

    function slugify(text){
      return text.toString().toLowerCase().trim()
        .replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-');
    }

    function resolveWorldHeader() {
      currentWorld = (typeof getCurrentWorld === 'function') ? getCurrentWorld() : null;

      if (!currentWorld || !currentWorld.id) {
        alert('Please select a world first.');
        window.location.href = 'YourWorlds.html';
        return false;
      }

      document.getElementById('world-name').textContent = currentWorld.name || 'Your World';
      document.getElementById('genre-display').textContent = currentWorld.genre || '-';
      document.getElementById('theme-display').textContent = currentWorld.theme || '-';
      return true;
    }

    async function loadKingdoms() {
      if (!currentWorld?.id) return;
      kingdoms = await getKingdomsByWorldId(currentWorld.id);
      displayKingdoms();
    }

    function openKingdomPage(id) {
      const selected = kingdoms.find(k => String(k.id) === String(id));
      if (!selected) return;
      localStorage.setItem('selectedKingdom', JSON.stringify(selected)); // UI convenience only
      localStorage.setItem('selectedCountryName', selected.name || '');
      window.location.href = `Kingdom.html?id=${selected.id}&name=${encodeURIComponent(slugify(selected.name || 'kingdom'))}`;
    }

    function displayKingdoms() {
      const empty = document.getElementById('no-kingdoms-section');
      const list = document.getElementById('kingdoms-list');

      if (!kingdoms.length) {
        empty.style.display = 'block';
        list.style.display = 'none';
        list.innerHTML = '';
        return;
      }

      empty.style.display = 'none';
      list.style.display = 'grid';
      list.innerHTML = '';

      kingdoms.forEach(k => {
        const link = document.createElement('a');
        link.className = 'kingdom-link';
        link.href = `Kingdom.html?id=${k.id}&name=${encodeURIComponent(slugify(k.name || 'kingdom'))}`;
        link.addEventListener('click', (e) => { e.preventDefault(); openKingdomPage(k.id); });

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h3 class="kingdom-name">${k.name || 'Untitled Kingdom'}</h3>
          <p class="kingdom-text"><strong>Type:</strong> ${k.type || 'Unknown'}</p>
          <p class="kingdom-text">${k.description || 'No description provided'}</p>
        `;

        link.appendChild(card);
        list.appendChild(link);
      });
    }

    window.addEventListener('load', async () => {
      const ok = resolveWorldHeader();
      if (!ok) return;
      await loadKingdoms();
    });
  </script>
</body>
</html>
