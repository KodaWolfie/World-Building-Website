<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Character Details</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=13">

  <style>
    .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px;flex-wrap:wrap;}
    .page-title{margin:0;color:var(--text);font-family:"UnifrakturCook", serif;font-size:clamp(1.6rem,3vw,2.2rem);line-height:1.1;}
    .muted{ color:var(--muted); margin:0; }
    .section-title{margin:0 0 .35rem 0;color:var(--text);font-family:"UnifrakturCook", serif;font-size:1.25rem;}
    .section-subtext{margin:0;color:var(--muted);font-size:.95rem;}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:10px;margin-top:12px;}
    .field label{display:block;font-size:.83rem;color:var(--muted);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.35px;}
    .field input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px;font:inherit;background:rgba(10,26,110,0.85);color:var(--text);}
    .field input::placeholder{color:rgba(255,230,109,.75);}
    .accordion{border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:10px;background:var(--surface);}
    details{border-bottom:1px solid var(--border);background:rgba(10,26,110,0.35);}
    details:last-child{ border-bottom:none; }
    summary{list-style:none;cursor:pointer;padding:12px 14px;font-weight:700;display:flex;justify-content:space-between;align-items:center;color:var(--text);}
    summary::-webkit-details-marker{ display:none; }
    summary::after{content:"+";color:var(--muted);font-size:1.1rem;}
    details[open] summary::after{content:"−";color:var(--primary);}
    .section-body{padding:0 14px 14px 14px;}
    textarea{width:100%;min-height:160px;resize:vertical;border:1px solid var(--border);border-radius:10px;padding:10px;font:inherit;line-height:1.45;margin-top:8px;background:rgba(10,26,110,0.85);color:var(--text);}
    textarea::placeholder{color:rgba(255,230,109,.75);}
    .actions{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;}
    @media(max-width:720px){.actions .btn{ flex:1; min-width:140px; }}
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <h1 id="character-name" class="page-title">Character</h1>
      <a class="link-back" href="Characters.html">← Back to Characters</a>
    </div>

    <section class="card" style="margin-bottom:14px;">
      <p id="character-role" class="muted">Role: Unknown</p>
      <p id="character-description" style="margin:.4rem 0 0 0; color:var(--text);">No description available.</p>
    </section>

    <section class="card" style="margin-bottom:14px;">
      <h2 class="section-title">Quick Profile (Short Answers)</h2>
      <p class="section-subtext">Always visible, quick-reference facts.</p>

      <div class="grid">
        <div class="field"><label>Age</label><input id="q_age" type="text" placeholder="e.g., 27"></div>
        <div class="field"><label>Pronouns</label><input id="q_pronouns" type="text" placeholder="e.g., she/her"></div>
        <div class="field"><label>Occupation</label><input id="q_occupation" type="text"></div>
        <div class="field"><label>Species / Race</label><input id="q_species" type="text"></div>
        <div class="field"><label>Homeland</label><input id="q_homeland" type="text"></div>
        <div class="field"><label>Affiliation</label><input id="q_affiliation" type="text"></div>
        <div class="field"><label>Name Meaning</label><input id="q_meaning" type="text"></div>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">Important Questions</h2>
      <p class="section-subtext">Use these for deep character development.</p>

      <div class="accordion" id="deepAccordion"></div>

      <div class="actions">
        <button class="btn btn-primary" id="saveBtn">Save All</button>
        <button class="btn btn-muted" id="expandAllBtn">Expand All</button>
        <button class="btn btn-muted" id="collapseAllBtn">Collapse All</button>
        <button class="btn btn-muted" id="clearBtn">Clear All</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js?v=20"></script>
  <script>
    const DEEP_TITLES = [
      "1) What do they look like? (including quirks)",
      "2) Do they have any powers or skills?",
      "3) What are they terrible at?",
      "4) What are their hobbies or interests?",
      "5) What are their closest relationships?",
      "6) What are their worst relationships?",
      "7) What is their past?",
      "8) What is their wound and how do they act with it?",
      "9) What is their misbelief and how do they act because of it?",
      "10) What is their biggest fear and how do they act around it?",
      "11) What is their fatal flaw?",
      "12) What is their biggest secret?",
      "13) What is their internal conflict?",
      "14) Who are they in the beginning of the story?",
      "15) How do they feel about themselves?",
      "16) How does this show in their behavior?",
      "17) What are their morals and beliefs? Are these different at the end?",
      "18) What are their top three core values?",
      "19) What is their voice like?",
      "20) Who are they at the end of the story?",
      "21) What is their goal / ambition?",
      "22) Why do they have this goal / ambition?",
      "23) What would make them give it up?",
      "24) What is the biggest obstacle or external conflict stopping them?",
      "25) How does the world see them?",
      "26) Is what this character wants, what they need?",
      "27) Why is this character in the role that they’re in?"
    ];

    const QUICK_IDS = ["q_age","q_pronouns","q_occupation","q_species","q_homeland","q_affiliation","q_meaning"];
    let currentCharacter = null;

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function renderDeepSections(savedDeep = {}) {
      const accordion = document.getElementById("deepAccordion");
      accordion.innerHTML = "";

      DEEP_TITLES.forEach((title, i) => {
        const id = `deep_${i}`;
        const details = document.createElement("details");
        details.innerHTML = `
          <summary>${title}</summary>
          <div class="section-body">
            <textarea id="${id}" placeholder="Write here...">${savedDeep[id] || ""}</textarea>
          </div>
        `;
        accordion.appendChild(details);
      });
    }

    function collectAllData() {
      const quick = {};
      QUICK_IDS.forEach(id => { quick[id] = document.getElementById(id)?.value || ""; });

      const deep = {};
      DEEP_TITLES.forEach((_, i) => {
        const id = `deep_${i}`;
        deep[id] = document.getElementById(id)?.value || "";
      });

      return { quick, deep };
    }

    function applyAllData(saved) {
      QUICK_IDS.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = saved?.quick?.[id] || "";
      });
      renderDeepSections(saved?.deep || {});
    }

    async function loadCharacter() {
      const characterId = Number(getQueryParam('id'));
      if (!characterId) return null;

      const user = await getCurrentUser();
      if (!user) return null;

      const { data, error } = await sb
        .from('characters')
        .select('id, name, role, description')
        .eq('user_id', user.id)
        .eq('id', characterId)
        .single();

      if (error) return null;
      return data;
    }

    async function loadProfile() {
      const user = await getCurrentUser();
      if (!user || !currentCharacter?.id) return {};

      const { data, error } = await sb
        .from('character_profiles')
        .select('quick, deep')
        .eq('user_id', user.id)
        .eq('character_id', currentCharacter.id)
        .maybeSingle();

      if (error) return {};
      return data || {};
    }

    async function saveProfile(showAlert = true) {
      const user = await getCurrentUser();
      if (!user || !currentCharacter?.id) return;

      const payload = collectAllData();

      const { error } = await sb
        .from('character_profiles')
        .upsert([{
          user_id: user.id,
          character_id: currentCharacter.id,
          quick: payload.quick,
          deep: payload.deep
        }], { onConflict: 'character_id' });

      if (error) {
        alert('Error saving character profile: ' + error.message);
        return;
      }

      if (showAlert) alert("Saved!");
    }

    window.addEventListener("load", async () => {
      currentCharacter = await loadCharacter();
      if (!currentCharacter) {
        document.getElementById('character-name').textContent = 'Character Not Found';
        document.getElementById('character-role').textContent = 'Role: -';
        document.getElementById('character-description').textContent =
          'This character could not be found. Return to Characters page.';
        renderDeepSections({});
        return;
      }

      document.title = `${currentCharacter.name} | Character Details`;
      document.getElementById('character-name').textContent = currentCharacter.name;
      document.getElementById('character-role').textContent = `Role: ${currentCharacter.role || 'Unknown'}`;
      document.getElementById('character-description').textContent = currentCharacter.description || 'No description provided';

      const saved = await loadProfile();
      applyAllData(saved);

      document.getElementById("saveBtn").addEventListener("click", () => saveProfile(true));
      document.getElementById("expandAllBtn").addEventListener("click", () => {
        document.querySelectorAll("#deepAccordion details").forEach(d => d.open = true);
      });
      document.getElementById("collapseAllBtn").addEventListener("click", () => {
        document.querySelectorAll("#deepAccordion details").forEach(d => d.open = false);
      });
      document.getElementById("clearBtn").addEventListener("click", async () => {
        if (!confirm("Clear all quick + important answers for this character?")) return;
        applyAllData({});
        await saveProfile(false);
      });

      document.addEventListener("input", (e) => {
        if (e.target.matches("input, textarea")) saveProfile(false);
      });
    });
  </script>
</body>
</html>
