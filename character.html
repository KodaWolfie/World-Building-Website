<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Character Details</title>
  <style>
    :root{
      --text:#111827;
      --muted:#6b7280;
      --accent:#2563eb;
      --bg:#ffffff;
      --border:#d1d5db;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      color:var(--text);
      background:var(--bg);
    }
    .wrap{
      max-width:980px;
      margin:32px auto;
      padding:0 16px;
    }
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
      gap:12px;
      flex-wrap:wrap;
    }
    .topbar a{
      color:var(--accent);
      text-decoration:none;
      font-weight:600;
    }
    .card{
      border:1px solid var(--border);
      border-radius:10px;
      padding:16px;
      margin-bottom:14px;
      background:#fff;
    }
    h1{margin:0 0 6px 0}
    h2{margin:0 0 10px 0}
    .muted{color:var(--muted);margin:0}

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:10px;
      margin-top:10px;
    }
    .field label{
      display:block;
      font-size:.86rem;
      color:var(--muted);
      margin-bottom:4px;
      font-weight:600;
      text-transform:uppercase;
      letter-spacing:.3px;
    }
    .field input{
      width:100%;
      border:1px solid var(--border);
      border-radius:8px;
      padding:9px 10px;
      font:inherit;
    }

    .accordion{
      border:1px solid var(--border);
      border-radius:10px;
      overflow:hidden;
      margin-top:8px;
    }
    details{
      border-bottom:1px solid var(--border);
      background:#fff;
    }
    details:last-child{border-bottom:none;}
    summary{
      list-style:none;
      cursor:pointer;
      padding:12px 14px;
      font-weight:700;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    summary::-webkit-details-marker{display:none;}
    summary::after{
      content:"+";
      color:var(--muted);
      font-size:1.1rem;
    }
    details[open] summary::after{
      content:"−";
      color:var(--accent);
    }
    .section-body{
      padding:0 14px 14px 14px;
    }
    textarea{
      width:100%;
      min-height:160px;
      resize:vertical;
      border:1px solid var(--border);
      border-radius:8px;
      padding:10px;
      font:inherit;
      line-height:1.45;
      margin-top:8px;
    }

    .actions{
      display:flex;
      gap:10px;
      margin-top:12px;
      flex-wrap:wrap;
    }
    button{
      border:1px solid var(--border);
      background:#fff;
      color:var(--text);
      padding:10px 14px;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
    }
    .primary{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <h1 id="character-name">Character</h1>
      <a href="Characters.html">← Back to Characters</a>
    </div>

    <section class="card">
      <p id="character-role" class="muted">Role: Unknown</p>
      <p id="character-description">No description available.</p>
    </section>

    <section class="card">
      <h2>Quick Profile (Short Answers)</h2>
      <p class="muted">Always visible, quick-reference facts.</p>

      <div class="grid">
        <div class="field"><label>Age</label><input id="q_age" type="text" placeholder="e.g., 27"></div>
        <div class="field"><label>Pronouns</label><input id="q_pronouns" type="text" placeholder="e.g., she/her"></div>
        <div class="field"><label>Occupation</label><input id="q_occupation" type="text"></div>
        <div class="field"><label>Species / Race</label><input id="q_species" type="text"></div>
        <div class="field"><label>Homeland</label><input id="q_homeland" type="text"></div>
        <div class="field"><label>Affiliation</label><input id="q_affiliation" type="text"></div>
        <div class="field"><label>Name Meaning</label><input id="q_meaning" type="text"></div>
      </div>
    </section>

    <section class="card">
      <h2>Important Questions</h2>
      <p class="muted">Use these for deep character development.</p>

      <div class="accordion" id="deepAccordion"></div>

      <div class="actions">
        <button class="primary" id="saveBtn">Save All</button>
        <button id="expandAllBtn">Expand All</button>
        <button id="collapseAllBtn">Collapse All</button>
        <button id="clearBtn">Clear All</button>
      </div>
    </section>
  </main>

  <script>
    const DEEP_TITLES = [
      "1) What do they look like? (including quirks)",
      "2) Do they have any powers or skills?",
      "3) What are their hobbies or interests?",
      "4) What are their closest relationships?",
      "5) What is their past?",
      "6) What is their wound and how do they act with it?",
      "7) What is their misbelief and how do they act because of it?",
      "8) What is their biggest fear and how do they act around it?",
      "9) What is their fatal flaw?",
      "10) What is their biggest secret?"
      "11) What is their internal conflict?"
      "12) Who are they in the beginning of the story?"
      "13) How do they feel about themselves?"
      "14) How does this show in their behavior?"
      "15) What are their morals and beliefs? Are these different at the end?"
      "16) Who are they at the end of the story?"
      "17) What is their goal / ambition?"
      "18) Why do they have this goal / ambition?"
      "19) What is the biggest obstacle or external conflict stopping them?"
      "20) Is what this character wants, what they need?"
      "21) Why is this character in the role that they’re in?"
    ];

    const QUICK_IDS = [
      "q_age","q_pronouns","q_occupation","q_species",
      "q_homeland","q_affiliation","q_meaning"
    ];

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function loadCharacter() {
      const characterId = getQueryParam('id');
      const storedCharacters = localStorage.getItem('characters');
      const characters = storedCharacters ? JSON.parse(storedCharacters) : [];

      let character = null;
      if (characterId) character = characters.find(c => String(c.id) === String(characterId));
      if (!character) {
        const selectedCharacter = localStorage.getItem('selectedCharacter');
        character = selectedCharacter ? JSON.parse(selectedCharacter) : null;
      }

      if (!character) {
        document.getElementById('character-name').textContent = 'Character Not Found';
        document.getElementById('character-role').textContent = 'Role: -';
        document.getElementById('character-description').textContent =
          'This character could not be found. Return to Characters page.';
        return null;
      }

      document.title = `${character.name} | Character Details`;
      document.getElementById('character-name').textContent = character.name;
      document.getElementById('character-role').textContent = `Role: ${character.role || 'Unknown'}`;
      document.getElementById('character-description').textContent = character.description || 'No description provided';
      return character;
    }

    function makeStorageKey(character) {
      return `characterProfile:${character.id}:${character.name}`;
    }

    function renderDeepSections(savedDeep = {}) {
      const accordion = document.getElementById("deepAccordion");
      accordion.innerHTML = "";

      DEEP_TITLES.forEach((title, i) => {
        const id = `deep_${i}`;
        const details = document.createElement("details");
        details.innerHTML = `
          <summary>${title}</summary>
          <div class="section-body">
            <textarea id="${id}" placeholder="Write here...">${savedDeep[id] || ""}</textarea>
          </div>
        `;
        accordion.appendChild(details);
      });
    }

    function collectAllData() {
      const quick = {};
      QUICK_IDS.forEach(id => {
        quick[id] = document.getElementById(id)?.value || "";
      });

      const deep = {};
      DEEP_TITLES.forEach((_, i) => {
        const id = `deep_${i}`;
        deep[id] = document.getElementById(id)?.value || "";
      });

      return { quick, deep };
    }

    function applyAllData(saved) {
      QUICK_IDS.forEach(id => {
        if (document.getElementById(id)) {
          document.getElementById(id).value = saved?.quick?.[id] || "";
        }
      });
      renderDeepSections(saved?.deep || {});
    }

    function loadSavedProfile(key) {
      try {
        return JSON.parse(localStorage.getItem(key) || "{}");
      } catch {
        return {};
      }
    }

    function saveProfile(key) {
      localStorage.setItem(key, JSON.stringify(collectAllData()));
      alert("Saved!");
    }

    window.addEventListener("load", () => {
      const character = loadCharacter();
      if (!character) return;

      const storageKey = makeStorageKey(character);
      const saved = loadSavedProfile(storageKey);
      applyAllData(saved);

      // buttons
      document.getElementById("saveBtn").addEventListener("click", () => saveProfile(storageKey));
      document.getElementById("expandAllBtn").addEventListener("click", () => {
        document.querySelectorAll("#deepAccordion details").forEach(d => d.open = true);
      });
      document.getElementById("collapseAllBtn").addEventListener("click", () => {
        document.querySelectorAll("#deepAccordion details").forEach(d => d.open = false);
      });
      document.getElementById("clearBtn").addEventListener("click", () => {
        if (!confirm("Clear all quick + important answers for this character?")) return;
        localStorage.removeItem(storageKey);
        applyAllData({});
      });

      // auto-save on input
      document.addEventListener("input", (e) => {
        if (e.target.matches("input, textarea")) {
          localStorage.setItem(storageKey, JSON.stringify(collectAllData()));
        }
      });
    });
  </script>
</body>
</html>
