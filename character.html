<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Character Details</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">

  <!-- Shared theme -->
  <link rel="stylesheet" href="theme.css?v=13">

  <style>
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
      gap:12px;
      flex-wrap:wrap;
    }

    .page-title{
      margin:0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:clamp(1.6rem,3vw,2.2rem);
      line-height:1.1;
    }

    .muted{ color:var(--muted); margin:0; }

    .section-title{
      margin:0 0 .35rem 0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:1.25rem;
    }

    .section-subtext{
      margin:0;
      color:var(--muted);
      font-size:.95rem;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:10px;
      margin-top:12px;
    }

    .field label{
      display:block;
      font-size:.83rem;
      color:var(--muted);
      margin-bottom:4px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.35px;
    }

    .field input{
      width:100%;
      border:1px solid var(--border);
      border-radius:10px;
      padding:10px;
      font:inherit;
      background:rgba(10,26,110,0.85);
      color:var(--text);
    }

    .field input::placeholder{
      color:rgba(255,230,109,.75);
    }

    .accordion{
      border:1px solid var(--border);
      border-radius:12px;
      overflow:hidden;
      margin-top:10px;
      background:var(--surface);
    }

    details{
      border-bottom:1px solid var(--border);
      background:rgba(10,26,110,0.35);
    }

    details:last-child{ border-bottom:none; }

    summary{
      list-style:none;
      cursor:pointer;
      padding:12px 14px;
      font-weight:700;
      display:flex;
      justify-content:space-between;
      align-items:center;
      color:var(--text);
    }

    summary::-webkit-details-marker{ display:none; }

    summary::after{
      content:"+";
      color:var(--muted);
      font-size:1.1rem;
    }

    details[open] summary::after{
      content:"−";
      color:var(--primary);
    }

    .section-body{
      padding:0 14px 14px 14px;
    }

    textarea{
      width:100%;
      min-height:160px;
      resize:vertical;
      border:1px solid var(--border);
      border-radius:10px;
      padding:10px;
      font:inherit;
      line-height:1.45;
      margin-top:8px;
      background:rgba(10,26,110,0.85);
      color:var(--text);
    }

    textarea::placeholder{
      color:rgba(255,230,109,.75);
    }

    .actions{
      display:flex;
      gap:10px;
      margin-top:12px;
      flex-wrap:wrap;
    }

    @media(max-width:720px){
      .actions .btn{ flex:1; min-width:140px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <h1 id="character-name" class="page-title">Character</h1>
      <a class="link-back" href="Characters.html">← Back to Characters</a>
    </div>

    <section class="card" style="margin-bottom:14px;">
      <p id="character-role" class="muted">Role: Unknown</p>
      <p id="character-description" style="margin:.4rem 0 0 0; color:var(--text);">No description available.</p>
    </section>

    <section class="card" style="margin-bottom:14px;">
      <h2 class="section-title">Quick Profile (Short Answers)</h2>
      <p class="section-subtext">Always visible, quick-reference facts.</p>

      <div class="grid">
        <div class="field"><label>Age</label><input id="q_age" type="text" placeholder="e.g., 27"></div>
        <div class="field"><label>Pronouns</label><input id="q_pronouns" type="text" placeholder="e.g., she/her"></div>
        <div class="field"><label>Occupation</label><input id="q_occupation" type="text"></div>
        <div class="field"><label>Species / Race</label><input id="q_species" type="text"></div>
        <div class="field"><label>Homeland</label><input id="q_homeland" type="text"></div>
        <div class="field"><label>Affiliation</label><input id="q_affiliation" type="text"></div>
        <div class="field"><label>Name Meaning</label><input id="q_meaning" type="text"></div>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">Important Questions</h2>
      <p class="section-subtext">Use these for deep character development.</p>

      <div class="accordion" id="deepAccordion"></div>

      <div class="actions">
        <button class="btn btn-primary" id="saveBtn">Save All</button>
        <button class="btn btn-muted" id="expandAllBtn">Expand All</button>
        <button class="btn btn-muted" id="collapseAllBtn">Collapse All</button>
        <button class="btn btn-muted" id="clearBtn">Clear All</button>
      </div>
    </section>
  </main>

  <script>
    const DEEP_TITLES = [
      "1) What do they look like? (including quirks)",
      "2) Do they have any powers or skills?",
      "3) What are they terrible at?",
      "4) What are their hobbies or interests?",
      "5) What are their closest relationships?",
      "6) What are their worst relationships?",
      "7) What is their past?",
      "8) What is their wound and how do they act with it?",
      "9) What is their misbelief and how do they act because of it?",
      "10) What is their biggest fear and how do they act around it?",
      "11) What is their fatal flaw?",
      "12) What is their biggest secret?",
      "13) What is their internal conflict?",
      "14) Who are they in the beginning of the story?",
      "15) How do they feel about themselves?",
      "16) How does this show in their behavior?",
      "17) What are their morals and beliefs? Are these different at the end?",
      "18) What are their top three core values?",
      "19) What is their voice like?",
      "20) Who are they at the end of the story?",
      "21) What is their goal / ambition?",
      "22) Why do they have this goal / ambition?",
      "23) What would make them give it up?",
      "24) What is the biggest obstacle or external conflict stopping them?",
      "25) How does the world see them?",
      "26) Is what this character wants, what they need?",
      "27) Why is this character in the role that they’re in?"
    ];

    const QUICK_IDS = [
      "q_age","q_pronouns","q_occupation","q_species",
      "q_homeland","q_affiliation","q_meaning"
    ];

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function loadCharacter() {
      const characterId = getQueryParam('id');
      const storedCharacters = localStorage.getItem('characters');
      const characters = storedCharacters ? JSON.parse(storedCharacters) : [];

      let character = null;
      if (characterId) character = characters.find(c => String(c.id) === String(characterId));
      if (!character) {
        const selectedCharacter = localStorage.getItem('selectedCharacter');
        character = selectedCharacter ? JSON.parse(selectedCharacter) : null;
      }

      if (!character) {
        document.getElementById('character-name').textContent = 'Character Not Found';
        document.getElementById('character-role').textContent = 'Role: -';
        document.getElementById('character-description').textContent =
          'This character could not be found. Return to Characters page.';
        return null;
      }

      document.title = `${character.name} | Character Details`;
      document.getElementById('character-name').textContent = character.name;
      document.getElementById('character-role').textContent = `Role: ${character.role || 'Unknown'}`;
      document.getElementById('character-description').textContent = character.description || 'No description provided';
      return character;
    }

    function makeStorageKey(character) {
      return `characterProfile:${character.id}:${character.name}`;
    }

    function renderDeepSections(savedDeep = {}) {
      const accordion = document.getElementById("deepAccordion");
      accordion.innerHTML = "";

      DEEP_TITLES.forEach((title, i) => {
        const id = `deep_${i}`;
        const details = document.createElement("details");
        details.innerHTML = `
          <summary>${title}</summary>
          <div class="section-body">
            <textarea id="${id}" placeholder="Write here...">${savedDeep[id] || ""}</textarea>
          </div>
        `;
        accordion.appendChild(details);
      });
    }

    function collectAllData() {
      const quick = {};
      QUICK_IDS.forEach(id => {
        quick[id] = document.getElementById(id)?.value || "";
      });

      const deep = {};
      DEEP_TITLES.forEach((_, i) => {
        const id = `deep_${i}`;
        deep[id] = document.getElementById(id)?.value || "";
      });

      return { quick, deep };
    }

    function applyAllData(saved) {
      QUICK_IDS.forEach(id => {
        if (document.getElementById(id)) {
          document.getElementById(id).value = saved?.quick?.[id] || "";
        }
      });
      renderDeepSections(saved?.deep || {});
    }

    function loadSavedProfile(key) {
      try {
        return JSON.parse(localStorage.getItem(key) || "{}");
      } catch {
        return {};
      }
    }

    function saveProfile(key) {
      localStorage.setItem(key, JSON.stringify(collectAllData()));
      alert("Saved!");
    }

    window.addEventListener("load", () => {
      const character = loadCharacter();
      if (!character) return;

      const storageKey = makeStorageKey(character);
      const saved = loadSavedProfile(storageKey);
      applyAllData(saved);

      document.getElementById("saveBtn").addEventListener("click", () => saveProfile(storageKey));
      document.getElementById("expandAllBtn").addEventListener("click", () => {
        document.querySelectorAll("#deepAccordion details").forEach(d => d.open = true);
      });
      document.getElementById("collapseAllBtn").addEventListener("click", () => {
        document.querySelectorAll("#deepAccordion details").forEach(d => d.open = false);
      });
      document.getElementById("clearBtn").addEventListener("click", () => {
        if (!confirm("Clear all quick + important answers for this character?")) return;
        localStorage.removeItem(storageKey);
        applyAllData({});
      });

      document.addEventListener("input", (e) => {
        if (e.target.matches("input, textarea")) {
          localStorage.setItem(storageKey, JSON.stringify(collectAllData()));
        }
      });
    });
  </script>
</body>
</html>
