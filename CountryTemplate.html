<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Country Template</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css?v=15">

  <style>
    .page-title{margin:0;color:var(--text);font-family:"UnifrakturCook", serif;font-size:clamp(1.8rem,3vw,2.4rem);line-height:1.1;}
    .world-name{color:var(--muted);margin:.25rem 0 0;font-weight:700;font-size:.95rem;}
    .layout{display:grid;gap:14px;grid-template-columns:1fr 1fr;margin-top:12px;}
    .field{display:flex;flex-direction:column;gap:.45rem;}
    .field label{color:var(--text);font-weight:700;font-size:.95rem;}
    .field input,.field textarea{
      width:100%;border:1px solid var(--border);border-radius:10px;padding:.75rem;font:inherit;
      background:rgba(10,26,110,.85);color:var(--text);box-sizing:border-box;
    }
    .field textarea{min-height:120px;resize:vertical;line-height:1.5;}
    .field input::placeholder,.field textarea::placeholder{color:rgba(255,230,109,.75);}
    .field.full{grid-column:1 / -1;}
    .actions{display:flex;gap:.65rem;flex-wrap:wrap;margin-top:14px;}
    @media(max-width:900px){.layout{grid-template-columns:1fr;}.field.full{grid-column:auto;}}
  </style>
</head>
<body>
  <main class="container" role="main">
    <div style="margin-bottom:12px;">
      <a class="link-back" href="Kingdoms.html">← Back to Kingdoms</a>
    </div>

    <section class="glass" style="padding:16px;">
      <h1 class="page-title">Country Template</h1>
      <p id="worldNameDisplay" class="world-name">World: —</p>

      <div class="layout">
        <div class="field">
          <label for="country-name">Country / Kingdom Name</label>
          <input id="country-name" type="text" placeholder="Name" />
        </div>

        <div class="field">
          <label for="government-type">Government Type</label>
          <input id="government-type" type="text" placeholder="Monarchy, Republic, Empire..." />
        </div>

        <div class="field">
          <label for="capital-city">Capital City</label>
          <input id="capital-city" type="text" placeholder="Capital city" />
        </div>

        <div class="field">
          <label for="population">Population</label>
          <input id="population" type="text" placeholder="Approximate population" />
        </div>

        <div class="field full">
          <label for="culture">Culture & Society</label>
          <textarea id="culture" placeholder="Customs, values, religion, social classes..."></textarea>
        </div>

        <div class="field full">
          <label for="economy">Economy & Trade</label>
          <textarea id="economy" placeholder="Resources, exports, imports, wealth distribution..."></textarea>
        </div>

        <div class="field full">
          <label for="military">Military & Defense</label>
          <textarea id="military" placeholder="Army structure, strengths, weaknesses, strategy..."></textarea>
        </div>

        <div class="field full">
          <label for="notes">Extra Notes</label>
          <textarea id="notes" placeholder="Anything else important..."></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="saveBtn">Save Country</button>
        <button class="btn btn-muted" id="clearBtn">Clear Country Sheet</button>
        <button class="btn btn-muted" onclick="window.location.href='WorldBuildingIdeas.html'">World Novel Index</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js?v=12"></script>
  <script>
    let kingdomsKey = 'kingdoms:__no_world__';
    let currentKingdomId = null;

    function qp(key){
      return new URLSearchParams(window.location.search).get(key);
    }

    function getCurrentWorldSafe() {
      try {
        return (typeof getCurrentWorld === 'function')
          ? getCurrentWorld()
          : JSON.parse(localStorage.getItem('currentWorld') || 'null');
      } catch {
        return null;
      }
    }

    function resolveWorld() {
      const world = getCurrentWorldSafe();
      const worldName = world?.name?.trim() || (localStorage.getItem('lastWorldName') || '').trim() || 'New World';
      kingdomsKey = worldName ? `kingdoms:${worldName}` : 'kingdoms:__no_world__';
      document.getElementById('worldNameDisplay').textContent = `World: ${worldName}`;
    }

    function loadKingdoms() {
      try {
        const arr = JSON.parse(localStorage.getItem(kingdomsKey) || '[]');
        return Array.isArray(arr) ? arr : [];
      } catch {
        return [];
      }
    }

    function saveKingdoms(arr) {
      localStorage.setItem(kingdomsKey, JSON.stringify(arr));
    }

    function findKingdom() {
      const id = qp('id');
      const kingdoms = loadKingdoms();

      if (id) {
        const found = kingdoms.find(k => String(k.id) === String(id));
        if (found) return found;
      }

      try {
        const selected = JSON.parse(localStorage.getItem('selectedKingdom') || 'null');
        if (selected) {
          const found = kingdoms.find(k => String(k.id) === String(selected.id));
          return found || selected;
        }
      } catch {}

      return null;
    }

    function applyForm(k) {
      document.getElementById('country-name').value = k?.name || '';
      document.getElementById('government-type').value = k?.type || '';
      document.getElementById('capital-city').value = k?.capitalCity || '';
      document.getElementById('population').value = k?.population || '';
      document.getElementById('culture').value = k?.culture || '';
      document.getElementById('economy').value = k?.economy || '';
      document.getElementById('military').value = k?.military || '';
      document.getElementById('notes').value = k?.notes || '';
      document.title = `${k?.name || 'Country'} | Country Template`;
    }

    function collectForm() {
      return {
        name: document.getElementById('country-name').value.trim(),
        type: document.getElementById('government-type').value.trim(),
        capitalCity: document.getElementById('capital-city').value.trim(),
        population: document.getElementById('population').value.trim(),
        culture: document.getElementById('culture').value.trim(),
        economy: document.getElementById('economy').value.trim(),
        military: document.getElementById('military').value.trim(),
        notes: document.getElementById('notes').value.trim()
      };
    }

    function initPage() {
      resolveWorld();

      const kingdom = findKingdom();
      if (!kingdom) {
        alert('No kingdom found. Please create/select one first.');
        window.location.href = 'Kingdoms.html';
        return;
      }

      currentKingdomId = kingdom.id;
      localStorage.setItem('selectedKingdom', JSON.stringify(kingdom));
      applyForm(kingdom);
    }

    function persistToKingdomRecord(showAlert = false) {
      if (!currentKingdomId) return;

      const data = collectForm();
      if (!data.name) {
        alert('Country/Kingdom name is required.');
        return;
      }

      const kingdoms = loadKingdoms();
      const idx = kingdoms.findIndex(k => String(k.id) === String(currentKingdomId));

      if (idx === -1) {
        const created = {
          id: currentKingdomId,
          ...data,
          description: data.notes || 'No description provided'
        };
        kingdoms.push(created);
        localStorage.setItem('selectedKingdom', JSON.stringify(created));
      } else {
        kingdoms[idx] = {
          ...kingdoms[idx],
          ...data,
          description: data.notes || kingdoms[idx].description || 'No description provided'
        };
        localStorage.setItem('selectedKingdom', JSON.stringify(kingdoms[idx]));
      }

      saveKingdoms(kingdoms);
      if (showAlert) alert('Saved!');
    }

    document.getElementById('saveBtn').addEventListener('click', () => {
      persistToKingdomRecord(true);
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (!confirm('Clear this country sheet?')) return;
      applyForm({
        name: '',
        type: '',
        capitalCity: '',
        population: '',
        culture: '',
        economy: '',
        military: '',
        notes: ''
      });
      persistToKingdomRecord(false);
    });

    document.addEventListener('input', (e) => {
      if (e.target.matches('#country-name, #government-type, #capital-city, #population, #culture, #economy, #military, #notes')) {
        persistToKingdomRecord(false);
      }
    });

    window.addEventListener('load', initPage);
  </script>
</body>
</html>
