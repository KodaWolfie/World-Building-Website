<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Country Page</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">

  <!-- Shared theme -->
  <link rel="stylesheet" href="theme.css?v=13">

  <style>
    .page-title{
      margin:0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:clamp(1.6rem,3vw,2.2rem);
      line-height:1.1;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
      flex-wrap:wrap;
    }

    .hint{
      color:var(--muted);
      margin:0 0 14px 0;
      font-size:.95rem;
    }

    .accordion{
      border:1px solid var(--border);
      border-radius:12px;
      overflow:hidden;
      background:var(--surface);
      box-shadow:var(--shadow);
    }

    details{
      border-bottom:1px solid var(--border);
      background:rgba(10,26,110,0.35);
    }
    details:last-child{ border-bottom:none; }

    summary{
      list-style:none;
      cursor:pointer;
      padding:14px 16px;
      font-weight:700;
      font-size:1rem;
      user-select:none;
      display:flex;
      justify-content:space-between;
      align-items:center;
      color:var(--text);
    }
    summary::-webkit-details-marker{ display:none; }

    summary::after{
      content:"+";
      color:var(--muted);
      font-size:1.1rem;
      line-height:1;
    }
    details[open] summary::after{
      content:"−";
      color:var(--primary);
    }

    .section-body{
      padding:0 16px 16px 16px;
    }

    textarea{
      width:100%;
      min-height:220px;
      resize:vertical;
      border:1px solid var(--border);
      border-radius:10px;
      padding:10px;
      font:inherit;
      line-height:1.45;
      background:rgba(10,26,110,0.85);
      color:var(--text);
    }

    textarea::placeholder{
      color:rgba(255,230,109,.75);
    }

    .actions{
      display:flex;
      gap:10px;
      margin-top:14px;
      flex-wrap:wrap;
    }

    @media(max-width:720px){
      .actions .btn{ flex:1; min-width:140px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <h1 id="countryTitle" class="page-title">Country Name</h1>
      <a class="link-back" href="Kingdoms.html">← Back to Kingdoms</a>
    </div>

    <section class="glass" style="padding:14px;">
      <p class="hint">Expand each header and write as much as you want. Content auto-saves in your browser.</p>
      <section class="accordion" id="countryAccordion"></section>

      <div class="actions">
        <button class="btn btn-primary" id="saveBtn">Save</button>
        <button class="btn btn-muted" id="expandAllBtn">Expand All</button>
        <button class="btn btn-muted" id="collapseAllBtn">Collapse All</button>
        <button class="btn btn-muted" id="clearBtn">Clear All</button>
      </div>
    </section>
  </main>

  <script>
    const SECTION_TITLES = [
      "1. Geography + Ecosystems",
      "2. Natural Resources and Climate",
      "3. Flora and Fauna",
      "4. Race/Species (of society) + Daily Life",
      "5. Food and Cuisine",
      "6. Fashion and Attire",
      "7. Culture(s) and Religion(s)",
      "8. Language, Writing System, Communications",
      "9. Art, Literature, Entertainment",
      "10. Education and Knowledge",
      "11. Calendar, Times, and Seasons",
      "12. Transportation, Technology, Innovations",
      "13. Economics + Trade",
      "14. Foreign Relations and Politics",
      "15. Symbols and Iconography",
      "16. Government/Power",
      "17. Military and Threats (Climate/Societal)",
      "18. Social Hierarchy and Class Structure",
      "19. Laws, Crimes, Punishment",
      "20. History and War(s)",
      "21. Relation to Magic System"
    ];

    const countryName = localStorage.getItem("selectedCountryName") || "Country Name";
    document.getElementById("countryTitle").textContent = countryName;

    const storageKey = `countryNotes:${countryName}`;
    const accordion = document.getElementById("countryAccordion");

    function renderSections(saved = {}) {
      accordion.innerHTML = "";
      SECTION_TITLES.forEach((title, i) => {
        const id = `section_${i}`;
        const details = document.createElement("details");
        details.innerHTML = `
          <summary>${title}</summary>
          <div class="section-body">
            <textarea id="${id}" placeholder="Write here...">${saved[id] || ""}</textarea>
          </div>
        `;
        accordion.appendChild(details);
      });
    }

    function collectData() {
      const data = {};
      SECTION_TITLES.forEach((_, i) => {
        const id = `section_${i}`;
        data[id] = document.getElementById(id)?.value || "";
      });
      return data;
    }

    function saveData() {
      localStorage.setItem(storageKey, JSON.stringify(collectData()));
      alert("Saved!");
    }

    function loadData() {
      try {
        return JSON.parse(localStorage.getItem(storageKey) || "{}");
      } catch {
        return {};
      }
    }

    document.getElementById("saveBtn").addEventListener("click", saveData);
    document.getElementById("expandAllBtn").addEventListener("click", () => {
      document.querySelectorAll("details").forEach(d => d.open = true);
    });
    document.getElementById("collapseAllBtn").addEventListener("click", () => {
      document.querySelectorAll("details").forEach(d => d.open = false);
    });
    document.getElementById("clearBtn").addEventListener("click", () => {
      if (!confirm("Clear all sections for this country?")) return;
      localStorage.removeItem(storageKey);
      renderSections({});
    });

    document.addEventListener("input", (e) => {
      if (e.target.tagName === "TEXTAREA") {
        localStorage.setItem(storageKey, JSON.stringify(collectData()));
      }
    });

    renderSections(loadData());
  </script>
</body>
</html>
