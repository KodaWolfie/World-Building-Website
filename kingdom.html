<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kingdom Details</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Old+Standard+TT:wght@400;700&display=swap" rel="stylesheet">

  <!-- Use shared blue theme -->
  <link rel="stylesheet" href="theme.css?v=13">

  <style>
    .page-title{
      margin:0;
      color:var(--text);
      font-family:"UnifrakturCook", serif;
      font-size:clamp(1.8rem,3vw,2.4rem);
      line-height:1.1;
    }

    .world-name{
      color:var(--muted);
      margin:.25rem 0 0;
      font-weight:700;
      font-size:.95rem;
    }

    .form-grid{
      display:grid;
      gap:12px;
      margin-top:12px;
    }

    .field label{
      display:block;
      margin-bottom:.45rem;
      color:var(--text);
      font-weight:700;
      font-size:.95rem;
    }

    .field input,
    .field textarea{
      width:100%;
      border:1px solid var(--border);
      border-radius:10px;
      padding:.75rem;
      font:inherit;
      background:rgba(10,26,110,.85);
      color:var(--text);
      box-sizing:border-box;
    }

    .field textarea{
      min-height:150px;
      resize:vertical;
      line-height:1.5;
    }

    .field input::placeholder,
    .field textarea::placeholder{
      color:rgba(255,230,109,.75);
    }

    .actions{
      display:flex;
      gap:.65rem;
      flex-wrap:wrap;
      margin-top:14px;
    }
  </style>
</head>
<body>
  <main class="container" role="main">
    <div style="margin-bottom:12px;">
      <a class="link-back" href="Kingdoms.html">← Back to Kingdoms</a>
    </div>

    <section class="glass" style="padding:16px;">
      <h1 class="page-title">Kingdom Details</h1>
      <p id="worldNameDisplay" class="world-name">World: —</p>

      <div class="form-grid">
        <div class="field">
          <label for="kingdom-name">Kingdom Name</label>
          <input id="kingdom-name" type="text" placeholder="Enter kingdom name" />
        </div>

        <div class="field">
          <label for="kingdom-type">Type</label>
          <input id="kingdom-type" type="text" placeholder="Monarchy, Republic, Empire..." />
        </div>

        <div class="field">
          <label for="kingdom-description">Short Description</label>
          <textarea id="kingdom-description" placeholder="Summaraize this kingdom..."></textarea>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" id="saveBtn">Save Changes</button>
        <button class="btn btn-muted" id="deleteBtn">Delete Kingdom</button>
        <button class="btn btn-muted" onclick="window.location.href='WorldBuildingIdeas.html'">World Building Ideas</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-config.js?v=11"></script>
  <script>
    let currentKingdomId = null;
    let kingdomsKey = 'kingdoms:__no_world__';

    function getQueryParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function getCurrentWorldSafe() {
      try {
        return (typeof getCurrentWorld === 'function')
          ? getCurrentWorld()
          : JSON.parse(localStorage.getItem('currentWorld') || 'null');
      } catch {
        return null;
      }
    }

    function resolveWorldContext() {
      const world = getCurrentWorldSafe();
      const worldName = world?.name?.trim() || (localStorage.getItem('lastWorldName') || '').trim() || 'New World';
      kingdomsKey = worldName ? `kingdoms:${worldName}` : 'kingdoms:__no_world__';
      document.getElementById('worldNameDisplay').textContent = `World: ${worldName}`;
      return worldName;
    }

    function loadKingdoms() {
      try {
        const arr = JSON.parse(localStorage.getItem(kingdomsKey) || '[]');
        if (Array.isArray(arr)) return arr;
      } catch {}
      return [];
    }

    function saveKingdoms(kingdoms) {
      localStorage.setItem(kingdomsKey, JSON.stringify(kingdoms));
    }

    function findInitialKingdom(kingdoms) {
      const idFromUrl = getQueryParam('id');
      if (idFromUrl) {
        const found = kingdoms.find(k => String(k.id) === String(idFromUrl));
        if (found) return found;
      }

      try {
        const selected = JSON.parse(localStorage.getItem('selectedKingdom') || 'null');
        if (selected) {
          const found = kingdoms.find(k => String(k.id) === String(selected.id));
          return found || selected;
        }
      } catch {}

      return null;
    }

    function applyKingdomToForm(kingdom) {
      document.getElementById('kingdom-name').value = kingdom?.name || '';
      document.getElementById('kingdom-type').value = kingdom?.type || '';
      document.getElementById('kingdom-description').value = kingdom?.description || '';
      document.title = `${kingdom?.name || 'Kingdom'} | Kingdom Details`;
    }

    function collectForm() {
      return {
        name: document.getElementById('kingdom-name').value.trim(),
        type: document.getElementById('kingdom-type').value.trim(),
        description: document.getElementById('kingdom-description').value.trim()
      };
    }

    function initPage() {
      resolveWorldContext();
      const kingdoms = loadKingdoms();
      const kingdom = findInitialKingdom(kingdoms);

      if (!kingdom) {
        currentKingdomId = null;
        applyKingdomToForm({ name: '', type: '', description: '' });
        alert('No kingdom found. Create one from the Kingdoms page first.');
        return;
      }

      currentKingdomId = kingdom.id;
      localStorage.setItem('selectedKingdom', JSON.stringify(kingdom));
      applyKingdomToForm(kingdom);
    }

    document.getElementById('saveBtn').addEventListener('click', () => {
      const form = collectForm();
      if (!form.name) {
        alert('Please enter a kingdom name.');
        return;
      }

      const kingdoms = loadKingdoms();
      const idx = kingdoms.findIndex(k => String(k.id) === String(currentKingdomId));

      if (idx === -1) {
        // if missing (edge case), recreate
        const newItem = {
          id: currentKingdomId || Date.now(),
          name: form.name,
          type: form.type || 'Unknown',
          description: form.description || 'No description provided'
        };
        kingdoms.push(newItem);
        currentKingdomId = newItem.id;
        localStorage.setItem('selectedKingdom', JSON.stringify(newItem));
        saveKingdoms(kingdoms);
        applyKingdomToForm(newItem);
        alert('Saved!');
        return;
      }

      kingdoms[idx] = {
        ...kingdoms[idx],
        name: form.name,
        type: form.type || 'Unknown',
        description: form.description || 'No description provided'
      };

      saveKingdoms(kingdoms);
      localStorage.setItem('selectedKingdom', JSON.stringify(kingdoms[idx]));
      applyKingdomToForm(kingdoms[idx]);
      alert('Saved!');
    });

    document.getElementById('deleteBtn').addEventListener('click', () => {
      if (!currentKingdomId) return;
      if (!confirm('Delete this kingdom?')) return;

      const kingdoms = loadKingdoms().filter(k => String(k.id) !== String(currentKingdomId));
      saveKingdoms(kingdoms);
      localStorage.removeItem('selectedKingdom');
      window.location.href = 'Kingdoms.html';
    });

    window.addEventListener('load', initPage);
  </script>
</body>
</html>
